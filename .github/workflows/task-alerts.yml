name: Jika Family — Task Alert

on:
  schedule:
    # Chạy mỗi 10 phút
    - cron: '*/10 * * * *'
  workflow_dispatch: # Cho phép chạy thủ công để test

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check task deadlines & send Telegram
        run: |
          node -e "
          const SB_URL = 'https://onkkzhgyynrlmcelvnnz.supabase.co';
          const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ua2t6aGd5eW5ybG1jZWx2bm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTUxNjgsImV4cCI6MjA5NTg5MTE2OH0.t7yBuf940BfinFGSKkiqss932yhukDVr8zRvGQpBB0A';
          const TG_TOKEN = '8914722655:AAHdKjzyLLQiOfA1zOQEWBFJTqLlJ1uEltc';
          const TG_CHAT_ID = '-1002587798916';

          async function main() {
            // 1. Lấy tasks từ Supabase
            const res = await fetch(SB_URL + '/rest/v1/jika_data?key=eq.jika_tasks&select=value', {
              headers: {
                'apikey': SB_KEY,
                'Authorization': 'Bearer ' + SB_KEY
              }
            });
            
            if (!res.ok) {
              console.log('Supabase error:', res.status, await res.text());
              return;
            }
            
            const data = await res.json();
            if (!data || !data.length) { console.log('Không có dữ liệu'); return; }
            
            let tasks = [];
            try {
              let val = data[0].value;
              if (typeof val === 'string') val = JSON.parse(val);
              if (Array.isArray(val)) tasks = val;
            } catch(e) { console.log('Parse error:', e.message); return; }
            
            console.log('Tổng tasks:', tasks.length);
            
            const now = Date.now();
            let changed = false;
            const updates = [];

            for (const t of tasks) {
              if (t.completed || !t.deadline || !t.alertBefore) continue;
              
              // Fix timezone: deadline lưu dạng 'YYYY-MM-DDTHH:mm' không có timezone
              // App iOS parse là giờ địa phương (UTC+7), nhưng GitHub Actions dùng UTC
              // => Cộng thêm 7*3600000 ms để align về UTC+7
              const UTC_OFFSET = 7 * 3600000;
              const dl = new Date(t.deadline).getTime() - UTC_OFFSET;
              const alertMs = (
                (t.alertBefore.d || 0) * 86400000 +
                (t.alertBefore.h || 0) * 3600000 +
                (t.alertBefore.m || 0) * 60000
              );
              
              if (alertMs <= 0) continue;
              
              const alertTime = dl - alertMs;
              const lastAlert = t.lastAlert || 0;
              const diffMs = dl - now;
              
              // Bỏ qua task đã quá hạn hơn 2 giờ — không cần nhắc nữa
              if (diffMs < -7200000) continue;
              
              // Chỉ nhắc nếu: đã đến giờ nhắc VÀ chưa nhắc trong 30 phút qua
              if (now >= alertTime && (now - lastAlert) > 1800000) {
                const diffH = Math.round(diffMs / 3600000);
                const diffD = Math.round(diffMs / 86400000);
                
                let timeStr = '';
                if (diffMs < 0) timeStr = 'ĐÃ QUÁ HẠN ⛔';
                else if (diffH < 1) timeStr = 'Còn dưới 1 giờ ⚠️';
                else if (diffH < 24) timeStr = 'Còn ' + diffH + ' giờ';
                else timeStr = 'Còn ' + diffD + ' ngày';

                const deadlineFormatted = t.deadline.replace('T', ' ').substring(0, 16).split('-').reverse().join('/').replace('/', '/').replace('2026/', '2026 lúc ').replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$1/$2/$3');
                const dl2 = new Date(new Date(t.deadline).getTime() - UTC_OFFSET + 7*3600000);
                const dlStr = dl2.getDate().toString().padStart(2,'0') + '/' + (dl2.getMonth()+1).toString().padStart(2,'0') + '/' + dl2.getFullYear() + ' lúc ' + dl2.getHours().toString().padStart(2,'0') + ':' + dl2.getMinutes().toString().padStart(2,'0');
                const assigneeIcon = t.assignee === 'Chồng' ? '👨' : '👩';
                const msg = '🚨 VIỆC CHƯA XONG — CẦN LÀM NGAY!\n\n📌 ' + t.title + '\n' + assigneeIcon + ' Người đảm nhận: ' + t.assignee + '\n📅 Deadline: ' + dlStr + '\n⏳ Thời gian còn lại: ' + timeStr + '\n\n👉 Mở app Jika Family để xử lý!';
                
                // Gửi Telegram
                const tgRes = await fetch(
                  'https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage?chat_id=' + TG_CHAT_ID + '&text=' + encodeURIComponent(msg) + '&parse_mode=HTML'
                );
                const tgData = await tgRes.json();
                
                if (tgData.ok) {
                  console.log('✅ Đã nhắc:', t.title);
                  t.lastAlert = now;
                  changed = true;
                } else {
                  console.log('❌ Telegram lỗi:', tgData.description);
                }
              }
            }
            
            // 2. Cập nhật lastAlert lên Supabase nếu có thay đổi
            if (changed) {
              const updateRes = await fetch(SB_URL + '/rest/v1/jika_data', {
                method: 'POST',
                headers: {
                  'apikey': SB_KEY,
                  'Authorization': 'Bearer ' + SB_KEY,
                  'Content-Type': 'application/json',
                  'Prefer': 'resolution=merge-duplicates,return=minimal'
                },
                body: JSON.stringify({ key: 'jika_tasks', value: JSON.stringify(tasks) })
              });
              console.log('Cập nhật Supabase:', updateRes.ok ? 'OK' : 'FAIL ' + updateRes.status);
            } else {
              console.log('Không có task nào cần nhắc lúc này');
            }
          }

          main().catch(e => { console.error('Error:', e.message); process.exit(1); });
          "

  check-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check event alerts & send Telegram
        run: |
          node -e "
          const SB_URL = 'https://onkkzhgyynrlmcelvnnz.supabase.co';
          const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ua2t6aGd5eW5ybG1jZWx2bm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTUxNjgsImV4cCI6MjA5NTg5MTE2OH0.t7yBuf940BfinFGSKkiqss932yhukDVr8zRvGQpBB0A';
          const TG_TOKEN = '8914722655:AAHdKjzyLLQiOfA1zOQEWBFJTqLlJ1uEltc';
          const TG_CHAT_ID = '-1002587798916';
          const UTC_OFFSET = 7 * 3600000;

          async function main() {
            const res = await fetch(SB_URL + '/rest/v1/jika_data?key=eq.jika_events&select=value', {
              headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
            });
            if (!res.ok) { console.log('Supabase error:', res.status); return; }

            const data = await res.json();
            if (!data || !data.length) { console.log('Không có sự kiện'); return; }

            let events = [];
            try {
              let val = data[0].value;
              if (typeof val === 'string') val = JSON.parse(val);
              if (Array.isArray(val)) events = val;
            } catch(e) { console.log('Parse error:', e.message); return; }

            console.log('Tổng sự kiện:', events.length);

            const now = Date.now();
            let changed = false;

            for (const e of events) {
              if (!e.alertBefore) continue;

              const alertMs = (
                (e.alertBefore.d || 0) * 86400000 +
                (e.alertBefore.h || 0) * 3600000 +
                (e.alertBefore.m || 0) * 60000
              );
              if (alertMs <= 0) continue;

              // Tính ngày sự kiện năm nay (hoặc năm sau nếu đã qua)
              const raw = e.d || e.date || '';
              let eventDate;
              const nowDate = new Date(now + UTC_OFFSET);
              if (raw.length === 5) { // MM-DD
                const [mo, dy] = raw.split('-');
                eventDate = new Date(Date.UTC(nowDate.getUTCFullYear(), parseInt(mo)-1, parseInt(dy)));
                if (eventDate.getTime() < now + UTC_OFFSET) {
                  eventDate = new Date(Date.UTC(nowDate.getUTCFullYear() + 1, parseInt(mo)-1, parseInt(dy)));
                }
              } else if (raw.length === 10) { // YYYY-MM-DD
                eventDate = new Date(raw + 'T00:00:00+07:00');
                if (eventDate.getTime() < now) {
                  eventDate = new Date((parseInt(raw.substring(0,4))+1) + raw.substring(4) + 'T00:00:00+07:00');
                }
              } else continue;

              const dl = eventDate.getTime();
              const alertTime = dl - alertMs;
              const lastAlert = e.lastAlert || 0;
              const diffMs = dl - now;

              // Bỏ qua nếu còn quá xa (> 32 ngày) hoặc đã qua quá 2 giờ
              if (diffMs > 32 * 86400000) continue;
              if (diffMs < -7200000) continue;

              const needRepeat = e.repeatH || e.repeatM;
              const repeatMs = ((e.repeatH||0) * 3600 + (e.repeatM||0) * 60) * 1000;
              const recurrence = e.recurrence || 'none';

              // Tính recurrenceMs: chu kỳ lặp lại định kỳ
              let recurrenceMs = 0;
              if (recurrence === 'daily')   recurrenceMs = 86400000;
              if (recurrence === 'weekly')  recurrenceMs = 7 * 86400000;
              if (recurrence === 'monthly') recurrenceMs = 30 * 86400000;
              if (recurrence === 'yearly')  recurrenceMs = 365 * 86400000;

              let shouldAlert = false;
              if (now >= alertTime) {
                if (lastAlert === 0) {
                  // Chưa nhắc lần nào
                  shouldAlert = true;
                } else if (recurrenceMs > 0 && (now - lastAlert) >= recurrenceMs) {
                  // Nhắc lại theo định kỳ ngày/tuần/tháng/năm
                  shouldAlert = true;
                } else if (needRepeat && repeatMs > 0 && (now - lastAlert) >= repeatMs) {
                  // Nhắc lại theo giờ/phút sau khi đến hạn
                  shouldAlert = true;
                } else if (!needRepeat && recurrenceMs === 0 && (now - lastAlert) > 1800000) {
                  // Không cài repeat, chỉ nhắc 1 lần
                  shouldAlert = true;
                }
              }

              if (shouldAlert) {
                const diffD = Math.round(diffMs / 86400000);
                const diffH = Math.round(diffMs / 3600000);
                let timeStr = '';
                if (diffMs < 0) timeStr = 'ĐÃ DIỄN RA ⛔';
                else if (diffD === 0) timeStr = 'HÔM NAY! 🎉';
                else if (diffD === 1) timeStr = 'NGÀY MAI ⚡';
                else if (diffH < 24) timeStr = 'Còn ' + diffH + ' giờ';
                else timeStr = 'Còn ' + diffD + ' ngày';

                const starIcon = e.priority === 1 ? '⭐ ' : '';
                const msg = '📅 SỰ KIỆN SẮP DIỄN RA\n\n' + starIcon + (e.n || e.name) + '\n⏳ ' + timeStr + '\n\n👉 Đừng quên chuẩn bị nhé! 💑';

                const tgRes = await fetch(
                  'https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage?chat_id=' + TG_CHAT_ID + '&text=' + encodeURIComponent(msg)
                );
                const tgData = await tgRes.json();

                if (tgData.ok) {
                  console.log('✅ Đã nhắc sự kiện:', e.n || e.name);
                  e.lastAlert = now;
                  changed = true;
                } else {
                  console.log('❌ Telegram lỗi:', tgData.description);
                }
              }
            }

            if (changed) {
              const updateRes = await fetch(SB_URL + '/rest/v1/jika_data', {
                method: 'POST',
                headers: {
                  'apikey': SB_KEY,
                  'Authorization': 'Bearer ' + SB_KEY,
                  'Content-Type': 'application/json',
                  'Prefer': 'resolution=merge-duplicates,return=minimal'
                },
                body: JSON.stringify({ key: 'jika_events', value: JSON.stringify(events) })
              });
              console.log('Cập nhật Supabase:', updateRes.ok ? 'OK' : 'FAIL ' + updateRes.status);
            } else {
              console.log('Không có sự kiện nào cần nhắc lúc này');
            }
          }

          main().catch(e => { console.error('Error:', e.message); process.exit(1); });
          "
    runs-on: ubuntu-latest
    # Chạy thứ 2 hàng tuần lúc 8h sáng (UTC+7 = 1h UTC)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule')
    steps:
      - name: Send weekly mood report
        run: |
          node -e "
          const SB_URL = 'https://onkkzhgyynrlmcelvnnz.supabase.co';
          const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ua2t6aGd5eW5ybG1jZWx2bm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTUxNjgsImV4cCI6MjA5NTg5MTE2OH0.t7yBuf940BfinFGSKkiqss932yhukDVr8zRvGQpBB0A';
          const TG_TOKEN = '8914722655:AAHdKjzyLLQiOfA1zOQEWBFJTqLlJ1uEltc';
          const TG_CHAT_ID = '-1002587798916';

          // Chỉ chạy vào thứ 2 (day = 1)
          const now = new Date();
          const dayOfWeek = now.getUTCDay();
          const hourUTC = now.getUTCHours();
          if (dayOfWeek !== 1 || hourUTC !== 1) { console.log('Không phải thứ 2 8h sáng, bỏ qua'); process.exit(0); }

          async function main() {
            const res = await fetch(SB_URL + '/rest/v1/jika_data?key=eq.jika_moods&select=value', {
              headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
            });
            const data = await res.json();
            if (!data || !data.length) { console.log('Không có dữ liệu mood'); return; }

            let moods = [];
            let val = data[0].value;
            if (typeof val === 'string') val = JSON.parse(val);
            if (Array.isArray(val)) moods = val;

            const days = [];
            for (let i = 6; i >= 0; i--) {
              const d = new Date();
              d.setDate(d.getDate() - i);
              days.push(d.toISOString().substring(0, 10));
            }

            function score(m) { return m === '😊' ? 3 : m === '😐' ? 2 : 1; }

            let chongScores = [], voScores = [];
            days.forEach(day => {
              const c = moods.filter(m => m.date === day && m.u === 'Chồng');
              const v = moods.filter(m => m.date === day && m.u === 'Vợ');
              if (c.length) chongScores.push(c.reduce((s, m) => s + score(m.m), 0) / c.length);
              if (v.length) voScores.push(v.reduce((s, m) => s + score(m.m), 0) / v.length);
            });

            if (!chongScores.length && !voScores.length) { console.log('Chưa có dữ liệu mood tuần này'); return; }

            const ac = chongScores.length ? (chongScores.reduce((a,b)=>a+b)/chongScores.length).toFixed(1) : 'N/A';
            const av = voScores.length ? (voScores.reduce((a,b)=>a+b)/voScores.length).toFixed(1) : 'N/A';
            const emoji = v => parseFloat(v) >= 2.5 ? '😊' : parseFloat(v) >= 2 ? '😐' : '😠';

            const msg = '📊 BÁO CÁO CẢM XÚC TUẦN NÀY\n\n👨 Chồng trung bình: ' + ac + '/3 ' + emoji(ac) + '\n👩 Vợ trung bình: ' + av + '/3 ' + emoji(av) + '\n\n💡 Check-in đều đặn giúp cả hai hiểu nhau hơn 💑';

            const tgRes = await fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage?chat_id=' + TG_CHAT_ID + '&text=' + encodeURIComponent(msg));
            const tgData = await tgRes.json();
            console.log(tgData.ok ? '✅ Đã gửi báo cáo tuần' : '❌ Lỗi: ' + tgData.description);
          }
          main().catch(e => console.error(e.message));
          "
