name: Jika Family — Task Alert

on:
  schedule:
    # Chạy mỗi 10 phút
    - cron: '*/10 * * * *'
  workflow_dispatch: # Cho phép chạy thủ công để test

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check task deadlines & send Telegram (cua so thoi gian, khong gui bu)
        run: |
          node -e "
          const SB_URL = 'https://onkkzhgyynrlmcelvnnz.supabase.co';
          const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ua2t6aGd5eW5ybG1jZWx2bm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTUxNjgsImV4cCI6MjA5NTg5MTE2OH0.t7yBuf940BfinFGSKkiqss932yhukDVr8zRvGQpBB0A';
          const TG_TOKEN = '8914722655:AAHdKjzyLLQiOfA1zOQEWBFJTqLlJ1uEltc';
          const TG_CHAT_ID = '-1002587798916';
          const UTC_OFFSET = 7 * 3600000;

          // Cua so quet cua workflow (~5 phut). Lon hon mot chut de bu lag/jitter cua GitHub Actions
          const WINDOW_MS = 7 * 60000;
          // Chong spam: khong gui cho 1 task neu vua gui bat ky loai canh bao nao trong X phut gan day
          const MIN_GAP_MS = 5 * 60000;

          function toUTC(localStr) {
            return new Date(localStr).getTime() - UTC_OFFSET;
          }

          function fmtVN(utcMs) {
            const d = new Date(utcMs + UTC_OFFSET);
            const pad = n => n.toString().padStart(2,'0');
            return pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ' ngay ' + pad(d.getUTCDate()) + '/' + pad(d.getUTCMonth()+1) + '/' + d.getUTCFullYear();
          }

          function zoneInfo(zone) {
            if (zone === 'red') return ['🔥','Khẩn cấp'];
            if (zone === 'green') return ['📅','Đã lên lịch'];
            return ['⏳','Để sau'];
          }

          function repeatLabel(mins) {
            if (mins % 60 === 0) return (mins/60) + ' giờ';
            return mins + ' phút';
          }

          async function sendTG(msg) {
            const tgRes = await fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage?chat_id=' + TG_CHAT_ID + '&text=' + encodeURIComponent(msg));
            const tgData = await tgRes.json();
            return tgData.ok;
          }

          // Moc gan nhat ma task da tung duoc gui bat ky loai canh bao nao
          function lastAnyAlert(t) {
            const arr = [t.lastPreAlertAt, t.lastDueAlertAt, t.lastOverdueAlertAt].filter(Boolean).map(s => new Date(s).getTime());
            return arr.length ? Math.max(...arr) : 0;
          }

          async function main() {
            const res = await fetch(SB_URL + '/rest/v1/jika_data?key=eq.jika_tasks&select=value', {
              headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
            });
            if (!res.ok) { console.log('Supabase error:', res.status, await res.text()); return; }

            const data = await res.json();
            if (!data || !data.length) { console.log('Không có dữ liệu'); return; }

            let tasks = [];
            try {
              let val = data[0].value;
              if (typeof val === 'string') val = JSON.parse(val);
              if (Array.isArray(val)) tasks = val;
            } catch(e) { console.log('Parse error:', e.message); return; }

            console.log('Tổng tasks:', tasks.length);

            const now = Date.now();
            let changed = false;

            for (const t of tasks) {
              if (t.completed || !t.deadline) continue;

              const dl = toUTC(t.deadline);
              const alertBeforeMs = (
                (t.alertBefore?.d || 0) * 86400000 +
                (t.alertBefore?.h || 0) * 3600000 +
                (t.alertBefore?.m || 0) * 60000
              );
              const repeatAfterOverdueMs = (t.repeatAfterOverdue || 120) * 60000;
              const [zoneIcon, zoneText] = zoneInfo(t.zone);
              const assigneeIcon = t.assignee === 'Chồng' ? '👨' : '👩';
              const deadlineFmt = fmtVN(dl);

              // Chong spam toan cuc cho task nay: vua gui loai nao do gan day thi bo qua moi loai khac trong cua so nay
              const lastAny = lastAnyAlert(t);
              if (lastAny && (now - lastAny) < MIN_GAP_MS) continue;

              // ===== 1. CANH BAO TRUOC HAN — chi gui dung trong cua so [alertTime, alertTime+WINDOW) =====
              if (alertBeforeMs > 0 && !t.lastPreAlertAt) {
                const alertTime = dl - alertBeforeMs;
                if (now >= alertTime && now < alertTime + WINDOW_MS && now < dl) {
                  const msg = '📋 BẠN CÓ 1 TASK CẦN CHUẨN BỊ\n\n' + zoneIcon + ' Mức độ: ' + zoneText + '\n👤 Người phụ trách: ' + t.assignee + '\n📝 Task: ' + t.title + '\n⏰ Cần hoàn thành trước: ' + deadlineFmt + '\n\n👉 Hãy chuẩn bị để không bị trễ hạn.';
                  if (await sendTG(msg)) {
                    console.log('✅ Pre-alert:', t.title);
                    t.lastPreAlertAt = new Date(now).toISOString();
                    changed = true;
                  }
                  continue; // 1 task = 1 message / lan chay
                }
              }

              // ===== 2. CANH BAO DEN HAN — chi gui dung trong cua so [deadline, deadline+WINDOW) =====
              if (!t.lastDueAlertAt && now >= dl && now < dl + WINDOW_MS) {
                const msg = '🚨 TASK ĐẾN HẠN\n\n' + zoneIcon + ' Mức độ: ' + zoneText + '\n👤 Người phụ trách: ' + t.assignee + '\n📝 Task: ' + t.title + '\n⏰ Hạn hoàn thành: ' + deadlineFmt + '\n\n👉 Vui lòng hoàn thành hoặc bấm Delay nếu cần dời lịch.';
                if (await sendTG(msg)) {
                  console.log('✅ Due-alert:', t.title);
                  t.lastDueAlertAt = new Date(now).toISOString();
                  changed = true;
                }
                continue;
              }

              // ===== 3. CANH BAO QUA HAN LAP LAI =====
              if (now > dl) {
                let delayActive = false;
                if (t.delayedUntil) {
                  const delayedUntilUTC = toUTC(t.delayedUntil);
                  if (now < delayedUntilUTC) delayActive = true;
                }
                if (delayActive) continue;

                if (!t.lastOverdueAlertAt) {
                  // Task qua han cu chua tung co moc overdue (vd: qua han tu truoc khi tinh nang nay ton tai,
                  // hoac workflow bi gian doan lau ngay). KHONG gui bu ngay — chi set moc va bo qua lan nay.
                  // Tu lan sau moi bat dau nhac theo repeatAfterOverdue.
                  t.lastOverdueAlertAt = new Date(now).toISOString();
                  changed = true;
                  console.log('⏭️  Bỏ qua catch-up, set mốc:', t.title);
                  continue;
                }

                const baseline = new Date(t.lastOverdueAlertAt).getTime();
                const sinceBaseline = now - baseline;

                // Chi gui dung trong cua so cua chu ky lap lai, khong gui don don tich luy
                if (sinceBaseline >= repeatAfterOverdueMs && sinceBaseline < repeatAfterOverdueMs + WINDOW_MS) {
                  const msg = '⚠️ TASK ĐÃ TRỄ HẠN\n\n' + zoneIcon + ' Mức độ: ' + zoneText + '\n👤 Người phụ trách: ' + t.assignee + '\n📝 Task: ' + t.title + '\n⏰ Đã quá hạn từ: ' + deadlineFmt + '\n🔁 Hệ thống sẽ nhắc lại mỗi: ' + repeatLabel(t.repeatAfterOverdue || 120) + '\n\n👉 Hãy hoàn thành hoặc bấm Delay để dời lịch nhắc.';
                  if (await sendTG(msg)) {
                    console.log('✅ Overdue-alert:', t.title);
                    t.lastOverdueAlertAt = new Date(now).toISOString();
                    changed = true;
                  }
                } else if (sinceBaseline >= repeatAfterOverdueMs + WINDOW_MS) {
                  // Da troi qua nhieu chu ky (vd workflow bi gian doan). Khong gui bu dồn —
                  // chi cap nhat lai moc ve 1 chu ky gan nhat de lan sau tiep tuc dung nhip, khong spam.
                  const missedCycles = Math.floor(sinceBaseline / repeatAfterOverdueMs);
                  const newBaseline = baseline + missedCycles * repeatAfterOverdueMs;
                  t.lastOverdueAlertAt = new Date(newBaseline).toISOString();
                  changed = true;
                  console.log('⏭️  Bỏ qua chu kỳ đã trôi qua, resync mốc:', t.title);
                }
              }
            }

            if (changed) {
              const updateRes = await fetch(SB_URL + '/rest/v1/jika_data', {
                method: 'POST',
                headers: {
                  'apikey': SB_KEY,
                  'Authorization': 'Bearer ' + SB_KEY,
                  'Content-Type': 'application/json',
                  'Prefer': 'resolution=merge-duplicates,return=minimal'
                },
                body: JSON.stringify({ key: 'jika_tasks', value: JSON.stringify(tasks) })
              });
              console.log('Cập nhật Supabase:', updateRes.ok ? 'OK' : 'FAIL ' + updateRes.status);
            } else {
              console.log('Không có task nào cần nhắc lúc này');
            }
          }

          main().catch(e => { console.error('Error:', e.message); process.exit(1); });
          "


  check-events:
    runs-on: ubuntu-latest
    steps:
      - name: Check event alerts & send Telegram
        run: |
          node -e "
          const SB_URL = 'https://onkkzhgyynrlmcelvnnz.supabase.co';
          const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ua2t6aGd5eW5ybG1jZWx2bm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTUxNjgsImV4cCI6MjA5NTg5MTE2OH0.t7yBuf940BfinFGSKkiqss932yhukDVr8zRvGQpBB0A';
          const TG_TOKEN = '8914722655:AAHdKjzyLLQiOfA1zOQEWBFJTqLlJ1uEltc';
          const TG_CHAT_ID = '-1002587798916';
          const UTC_OFFSET = 7 * 3600000;

          async function main() {
            const res = await fetch(SB_URL + '/rest/v1/jika_data?key=eq.jika_events&select=value', {
              headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
            });
            if (!res.ok) { console.log('Supabase error:', res.status); return; }

            const data = await res.json();
            if (!data || !data.length) { console.log('Không có sự kiện'); return; }

            let events = [];
            try {
              let val = data[0].value;
              if (typeof val === 'string') val = JSON.parse(val);
              if (Array.isArray(val)) events = val;
            } catch(e) { console.log('Parse error:', e.message); return; }

            console.log('Tổng sự kiện:', events.length);

            const now = Date.now();
            let changed = false;

            for (const e of events) {
              if (!e.alertBefore) continue;

              const alertMs = (
                (e.alertBefore.d || 0) * 86400000 +
                (e.alertBefore.h || 0) * 3600000 +
                (e.alertBefore.m || 0) * 60000
              );
              if (alertMs <= 0) continue;

              // Tính ngày sự kiện năm nay (hoặc năm sau nếu đã qua)
              const raw = e.d || e.date || '';
              let eventDate;
              const nowDate = new Date(now + UTC_OFFSET);
              if (raw.length === 5) { // MM-DD
                const [mo, dy] = raw.split('-');
                eventDate = new Date(Date.UTC(nowDate.getUTCFullYear(), parseInt(mo)-1, parseInt(dy)));
                if (eventDate.getTime() < now + UTC_OFFSET) {
                  eventDate = new Date(Date.UTC(nowDate.getUTCFullYear() + 1, parseInt(mo)-1, parseInt(dy)));
                }
              } else if (raw.length === 10) { // YYYY-MM-DD
                eventDate = new Date(raw + 'T00:00:00+07:00');
                if (eventDate.getTime() < now) {
                  eventDate = new Date((parseInt(raw.substring(0,4))+1) + raw.substring(4) + 'T00:00:00+07:00');
                }
              } else continue;

              const dl = eventDate.getTime();
              const alertTime = dl - alertMs;
              const lastAlert = e.lastAlert || 0;
              const diffMs = dl - now;

              // Bỏ qua nếu còn quá xa (> 32 ngày) hoặc đã qua quá 2 giờ
              if (diffMs > 32 * 86400000) continue;
              if (diffMs < -7200000) continue;

              const needRepeat = e.repeatH || e.repeatM;
              const repeatMs = ((e.repeatH||0) * 3600 + (e.repeatM||0) * 60) * 1000;
              const recurrence = e.recurrence || 'none';

              // Tính recurrenceMs: chu kỳ lặp lại định kỳ
              let recurrenceMs = 0;
              if (recurrence === 'daily')   recurrenceMs = 86400000;
              if (recurrence === 'weekly')  recurrenceMs = 7 * 86400000;
              if (recurrence === 'monthly') recurrenceMs = 30 * 86400000;
              if (recurrence === 'yearly')  recurrenceMs = 365 * 86400000;

              let shouldAlert = false;
              if (now >= alertTime) {
                if (lastAlert === 0) {
                  // Chưa nhắc lần nào
                  shouldAlert = true;
                } else if (recurrenceMs > 0 && (now - lastAlert) >= recurrenceMs) {
                  // Nhắc lại theo định kỳ ngày/tuần/tháng/năm
                  shouldAlert = true;
                } else if (needRepeat && repeatMs > 0 && (now - lastAlert) >= repeatMs) {
                  // Nhắc lại theo giờ/phút sau khi đến hạn
                  shouldAlert = true;
                } else if (!needRepeat && recurrenceMs === 0 && (now - lastAlert) > 1800000) {
                  // Không cài repeat, chỉ nhắc 1 lần
                  shouldAlert = true;
                }
              }

              if (shouldAlert) {
                const diffD = Math.round(diffMs / 86400000);
                const diffH = Math.round(diffMs / 3600000);
                let timeStr = '';
                if (diffMs < 0) timeStr = 'ĐÃ DIỄN RA ⛔';
                else if (diffD === 0) timeStr = 'HÔM NAY! 🎉';
                else if (diffD === 1) timeStr = 'NGÀY MAI ⚡';
                else if (diffH < 24) timeStr = 'Còn ' + diffH + ' giờ';
                else timeStr = 'Còn ' + diffD + ' ngày';

                const starIcon = e.priority === 1 ? '⭐ ' : '';
                const msg = '📅 SỰ KIỆN SẮP DIỄN RA\n\n' + starIcon + (e.n || e.name) + '\n⏳ ' + timeStr + '\n\n👉 Đừng quên chuẩn bị nhé! 💑';

                const tgRes = await fetch(
                  'https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage?chat_id=' + TG_CHAT_ID + '&text=' + encodeURIComponent(msg)
                );
                const tgData = await tgRes.json();

                if (tgData.ok) {
                  console.log('✅ Đã nhắc sự kiện:', e.n || e.name);
                  e.lastAlert = now;
                  changed = true;
                } else {
                  console.log('❌ Telegram lỗi:', tgData.description);
                }
              }
            }

            if (changed) {
              const updateRes = await fetch(SB_URL + '/rest/v1/jika_data', {
                method: 'POST',
                headers: {
                  'apikey': SB_KEY,
                  'Authorization': 'Bearer ' + SB_KEY,
                  'Content-Type': 'application/json',
                  'Prefer': 'resolution=merge-duplicates,return=minimal'
                },
                body: JSON.stringify({ key: 'jika_events', value: JSON.stringify(events) })
              });
              console.log('Cập nhật Supabase:', updateRes.ok ? 'OK' : 'FAIL ' + updateRes.status);
            } else {
              console.log('Không có sự kiện nào cần nhắc lúc này');
            }
          }

          main().catch(e => { console.error('Error:', e.message); process.exit(1); });
          "

  check-fixed-expenses:
    runs-on: ubuntu-latest
    steps:
      - name: Check fixed expenses & send Telegram
        run: |
          node -e "
          const SB_URL = 'https://onkkzhgyynrlmcelvnnz.supabase.co';
          const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ua2t6aGd5eW5ybG1jZWx2bm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTUxNjgsImV4cCI6MjA5NTg5MTE2OH0.t7yBuf940BfinFGSKkiqss932yhukDVr8zRvGQpBB0A';
          const TG_TOKEN = '8914722655:AAHdKjzyLLQiOfA1zOQEWBFJTqLlJ1uEltc';
          const TG_CHAT_ID = '-1002587798916';
          const UTC_OFFSET = 7 * 3600000;

          async function main() {
            const res = await fetch(SB_URL + '/rest/v1/jika_data?key=eq.jika_fixed_exps&select=value', {
              headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
            });
            if (!res.ok) { console.log('Supabase error:', res.status); return; }
            const data = await res.json();
            if (!data || !data.length) { console.log('Không có khoản cố định'); return; }
            let fixedExps = [];
            try {
              let val = data[0].value;
              if (typeof val === 'string') val = JSON.parse(val);
              if (Array.isArray(val)) fixedExps = val;
            } catch(e) { return; }
            console.log('Tổng khoản cố định:', fixedExps.length);
            const now = Date.now();
            const nowVN = new Date(now + UTC_OFFSET);
            let changed = false;
            for (const f of fixedExps) {
              if (!f.payDay || !f.alertBefore) continue;
              const alertMs = ((f.alertBefore.d||0)*86400000 + (f.alertBefore.h||0)*3600000 + (f.alertBefore.m||0)*60000);
              if (alertMs <= 0) continue;
              let payDate = new Date(Date.UTC(nowVN.getUTCFullYear(), nowVN.getUTCMonth(), f.payDay));
              if (payDate.getTime() < now + UTC_OFFSET) {
                payDate = new Date(Date.UTC(nowVN.getUTCFullYear(), nowVN.getUTCMonth()+1, f.payDay));
              }
              const dl = payDate.getTime() - UTC_OFFSET;
              const alertTime = dl - alertMs;
              const lastAlert = f.lastAlert || 0;
              const diffMs = dl - now;
              if (diffMs < -86400000) continue;
              if (now < alertTime) continue;
              if ((now - lastAlert) < 1800000) continue;
              const diffD = Math.round(diffMs / 86400000);
              const timeStr = diffD === 0 ? 'HÔM NAY! 🔴' : diffD === 1 ? 'NGÀY MAI ⚠️' : 'Còn ' + diffD + ' ngày';
              const msg = '💳 NHẮC THANH TOÁN CỐ ĐỊNH\n\n📌 ' + f.name + '\n💰 ' + parseInt(f.amount).toLocaleString('vi') + 'đ\n📅 Ngày ' + f.payDay + ' hàng tháng\n⏳ ' + timeStr + '\n\n👉 Đừng quên thanh toán nhé!';
              const tgRes = await fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage?chat_id=' + TG_CHAT_ID + '&text=' + encodeURIComponent(msg));
              const tgData = await tgRes.json();
              if (tgData.ok) { console.log('✅ Đã nhắc:', f.name); f.lastAlert = now; changed = true; }
              else { console.log('❌ Lỗi:', tgData.description); }
            }
            if (changed) {
              await fetch(SB_URL + '/rest/v1/jika_data', {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
                body: JSON.stringify({ key: 'jika_fixed_exps', value: JSON.stringify(fixedExps) })
              });
            } else { console.log('Không có khoản nào cần nhắc'); }
          }
          main().catch(e => { console.error('Error:', e.message); process.exit(1); });
          "

  weekly-mood-report:
    runs-on: ubuntu-latest
    # Chạy thứ 2 hàng tuần lúc 8h sáng (UTC+7 = 1h UTC)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule')
    steps:
      - name: Send weekly mood report
        run: |
          node -e "
          const SB_URL = 'https://onkkzhgyynrlmcelvnnz.supabase.co';
          const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ua2t6aGd5eW5ybG1jZWx2bm56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTUxNjgsImV4cCI6MjA5NTg5MTE2OH0.t7yBuf940BfinFGSKkiqss932yhukDVr8zRvGQpBB0A';
          const TG_TOKEN = '8914722655:AAHdKjzyLLQiOfA1zOQEWBFJTqLlJ1uEltc';
          const TG_CHAT_ID = '-1002587798916';

          // Chỉ chạy vào thứ 2 (day = 1)
          const now = new Date();
          const dayOfWeek = now.getUTCDay();
          const hourUTC = now.getUTCHours();
          if (dayOfWeek !== 1 || hourUTC !== 1) { console.log('Không phải thứ 2 8h sáng, bỏ qua'); process.exit(0); }

          async function main() {
            const res = await fetch(SB_URL + '/rest/v1/jika_data?key=eq.jika_moods&select=value', {
              headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
            });
            const data = await res.json();
            if (!data || !data.length) { console.log('Không có dữ liệu mood'); return; }

            let moods = [];
            let val = data[0].value;
            if (typeof val === 'string') val = JSON.parse(val);
            if (Array.isArray(val)) moods = val;

            const days = [];
            for (let i = 6; i >= 0; i--) {
              const d = new Date();
              d.setDate(d.getDate() - i);
              days.push(d.toISOString().substring(0, 10));
            }

            function score(m) { return m === '😊' ? 3 : m === '😐' ? 2 : 1; }

            let chongScores = [], voScores = [];
            days.forEach(day => {
              const c = moods.filter(m => m.date === day && m.u === 'Chồng');
              const v = moods.filter(m => m.date === day && m.u === 'Vợ');
              if (c.length) chongScores.push(c.reduce((s, m) => s + score(m.m), 0) / c.length);
              if (v.length) voScores.push(v.reduce((s, m) => s + score(m.m), 0) / v.length);
            });

            if (!chongScores.length && !voScores.length) { console.log('Chưa có dữ liệu mood tuần này'); return; }

            const ac = chongScores.length ? (chongScores.reduce((a,b)=>a+b)/chongScores.length).toFixed(1) : 'N/A';
            const av = voScores.length ? (voScores.reduce((a,b)=>a+b)/voScores.length).toFixed(1) : 'N/A';
            const emoji = v => parseFloat(v) >= 2.5 ? '😊' : parseFloat(v) >= 2 ? '😐' : '😠';

            const msg = '📊 BÁO CÁO CẢM XÚC TUẦN NÀY\n\n👨 Chồng trung bình: ' + ac + '/3 ' + emoji(ac) + '\n👩 Vợ trung bình: ' + av + '/3 ' + emoji(av) + '\n\n💡 Check-in đều đặn giúp cả hai hiểu nhau hơn 💑';

            const tgRes = await fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage?chat_id=' + TG_CHAT_ID + '&text=' + encodeURIComponent(msg));
            const tgData = await tgRes.json();
            console.log(tgData.ok ? '✅ Đã gửi báo cáo tuần' : '❌ Lỗi: ' + tgData.description);
          }
