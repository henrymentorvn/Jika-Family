<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jika Family — Digital Brain</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --ios-red: #ff3b30;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-grey: #8e8e93;
            --glass: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #1c1c1e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Hình nền động mờ ảo */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #ee9ca7, #ffdde1, #2193b0, #6dd5ed);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            filter: blur(50px);
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* App Wrapper */
        .app-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* Header */
        header {
            padding: 50px 20px 10px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        .user-badge {
            background: var(--glass); padding: 5px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 600;
            border: 1px solid var(--glass-border);
            cursor: pointer;
        }

        /* Main Content Area */
        main {
            flex: 1; overflow-y: auto; padding: 15px;
            padding-bottom: 100px; /* Chừa chỗ cho tab bar */
        }

        /* Mood Overlay */
        #mood-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s ease;
        }
        .mood-card {
            background: white; padding: 30px; border-radius: 35px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 85%; max-width: 320px;
        }
        .mood-options { display: flex; justify-content: space-around; margin-top: 25px; }
        .mood-btn { 
            font-size: 45px; cursor: pointer; border: none; background: none;
            transition: transform 0.2s;
        }
        .mood-btn:active { transform: scale(0.8); }

        /* Eisenhower Sections */
        .section-label {
            font-size: 13px; font-weight: 700; color: #555;
            margin: 15px 0 8px 10px; display: flex; align-items: center; gap: 6px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Task Card */
        .task-card {
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 15px; margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .task-info h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .task-info p { margin: 4px 0 0; font-size: 11px; color: #555; }
        .task-meta { display: flex; gap: 10px; align-items: center; }
        .msg-count { font-size: 12px; background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 10px; }

        /* Bottom Tab Bar */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; padding-top: 10px;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center;
            color: #666; font-size: 10px; font-weight: 500; cursor: pointer;
        }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 24px; margin-bottom: 4px; }

        /* Task Modal (Chat) */
        .modal {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.2); display: none;
            justify-content: center; align-items: flex-end;
        }
        .modal-content {
            background: white; width: 100%; max-height: 85%;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 20px; display: flex; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .chat-box { flex: 1; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        .msg { margin-bottom: 10px; font-size: 14px; max-width: 80%; padding: 8px 12px; border-radius: 15px; }
        .msg.sent { background: var(--ios-blue); color: white; align-self: flex-end; margin-left: auto; }
        .msg.received { background: #e9e9eb; color: black; }
        
        .chat-input-area { display: flex; gap: 10px; padding-bottom: 20px; }
        .chat-input { 
            flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd;
            font-size: 14px; outline: none;
        }

        /* Floating Button */
        .fab {
            position: fixed; bottom: 100px; right: 20px;
            width: 56px; height: 56px; border-radius: 28px;
            background: var(--ios-blue); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 10px 20px rgba(0,122,255,0.3);
            cursor: pointer; z-index: 100; border: none;
        }

        .btn-done {
            background: var(--ios-green); color: white; border: none;
            padding: 10px; border-radius: 12px; font-weight: 600; cursor: pointer;
        }

        /* Responsive */
        @media (min-width: 500px) {
            body { display: flex; justify-content: center; background: #000; }
            .app-container { width: 375px; height: 812px; margin-top: 50px; border-radius: 40px; overflow: hidden; position: relative; border: 8px solid #333; }
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <!-- MOOD CHECK-IN OVERLAY -->
    <div id="mood-overlay">
        <div class="mood-card">
            <h2 id="mood-user-name">Chào bạn ❤️</h2>
            <p style="color: #666; font-size: 14px;">Cảm xúc của bạn lúc này?</p>
            <div class="mood-options">
                <button class="mood-btn" onclick="saveMood('happy')">😊</button>
                <button class="mood-btn" onclick="saveMood('neutral')">😐</button>
                <button class="mood-btn" onclick="saveMood('stress')">😠</button>
            </div>
            <button onclick="closeMood()" style="margin-top: 20px; background: none; border: none; color: #999; font-size: 12px;">Bỏ qua</button>
        </div>
    </div>

    <div class="app-container">
        <header>
            <div>
                <h1 id="page-title">Nếu là Task</h1>
                <div id="sync-indicator" style="font-size: 10px; color: var(--ios-green);">● Live Sync</div>
            </div>
            <div class="user-badge" id="role-toggle" onclick="switchUser()">Chồng</div>
        </header>

        <main id="main-content">
            <!-- Eisenhower Matrix sẽ render ở đây -->
        </main>

        <button class="fab" onclick="showAddTask()">+</button>

        <div class="tab-bar">
            <div class="tab-item active" onclick="nav('tasks')">
                <span class="tab-icon">📋</span> Eisenhower
            </div>
            <div class="tab-item" onclick="nav('events')">
                <span class="tab-icon">⏳</span> Sự kiện
            </div>
            <div class="tab-item" onclick="nav('finance')">
                <span class="tab-icon">💰</span> Tài chính
            </div>
            <div class="tab-item" onclick="nav('vault')">
                <span class="tab-icon">👤</span> Vault
            </div>
        </div>
    </div>

    <!-- TASK DETAIL / CHAT MODAL -->
    <div id="task-modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2 id="modal-task-title" style="margin: 0; font-size: 20px;"></h2>
                    <p id="modal-task-desc" style="font-size: 13px; color: #666; margin: 5px 0;"></p>
                </div>
                <button class="btn-done" id="complete-btn">Xong</button>
            </div>
            
            <div id="chat-limit-warning" style="display:none; color: var(--ios-red); font-size: 11px; text-align: center; padding: 10px; background: #fff1f0; border-radius: 10px; margin-top: 10px;">
                ⚠️ Đã đạt 10 tin nhắn. Hai bạn nên nói chuyện trực tiếp!
            </div>

            <div class="chat-box" id="task-chat-box">
                <!-- Tin nhắn render ở đây -->
            </div>

            <div class="chat-input-area" id="chat-input-container">
                <input type="text" id="chat-input-msg" class="chat-input" placeholder="Viết phản hồi...">
                <button onclick="sendChatMessage()" style="background: var(--ios-blue); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 18px;">↑</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const SB_URL = "https://zxvlthyrahpfzmrnfbib.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dmx0aHlyaGFwZnptcm5mYmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjM2MjYsImV4cCI6MjA5NTc5OTYyNn0.sjJcMt4RkP5nWF2wldAFV1bIp7i56B0EPXlMtEHMkss";
        const TG_CHAT_ID = "-1002587798916";
        const TG_TOKEN = ""; // Bạn sẽ điền sau

        let _sbClient = supabase.createClient(SB_URL, SB_KEY);
        let currentUser = localStorage.getItem('jika_user') || 'Chồng';
        let tasks = [];
        let currentOpenTaskId = null;

        // INITIALIZE
        async function init() {
            document.getElementById('role-toggle').innerText = currentUser;
            document.getElementById('mood-user-name').innerText = `Chào ${currentUser} ❤️`;
            await loadTasks();
            setupRealtime();
        }

        // DATABASE LOGIC
        async function loadTasks() {
            const { data, error } = await _sbClient.from('jika_data').select('*').eq('key', 'jika_tasks').single();
            if (data) {
                tasks = JSON.parse(data.value);
                renderTasks();
            }
        }

        async function saveTasksToCloud() {
            await _sbClient.from('jika_data').upsert({ key: 'jika_tasks', value: JSON.stringify(tasks) });
        }

        function setupRealtime() {
            _sbClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'jika_data' }, payload => {
                if (payload.new && payload.new.key === 'jika_tasks') {
                    tasks = JSON.parse(payload.new.value);
                    renderTasks();
                    if(currentOpenTaskId) renderChat(currentOpenTaskId);
                }
            }).subscribe();
        }

        // UI LOGIC
        function switchUser() {
            currentUser = (currentUser === 'Chồng') ? 'Vợ' : 'Chồng';
            localStorage.setItem('jika_user', currentUser);
            document.getElementById('role-toggle').innerText = currentUser;
            document.getElementById('mood-user-name').innerText = `Chào ${currentUser} ❤️`;
            document.getElementById('mood-overlay').style.display = 'flex';
            document.getElementById('mood-overlay').style.opacity = '1';
        }

        function closeMood() {
            document.getElementById('mood-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('mood-overlay').style.display = 'none', 500);
        }

        async function saveMood(moodType) {
            // Logic lưu mood sẽ được cập nhật ở Module tài chính & báo cáo
            console.log(`${currentUser} feeling ${moodType}`);
            closeMood();
        }

        function renderTasks() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            const zones = [
                { id: 'red', label: 'LÀM NGAY', color: 'var(--ios-red)' },
                { id: 'green', label: 'LÊN LỊCH', color: 'var(--ios-green)' },
                { id: 'grey', label: 'ĐỂ SAU', color: 'var(--ios-grey)' }
            ];

            zones.forEach(zone => {
                const zoneTasks = tasks.filter(t => t.zone === zone.id && !t.completed);
                let html = `<div class="section-label"><div class="dot" style="background:${zone.color}"></div>${zone.label}</div>`;
                
                if(zoneTasks.length === 0) {
                    html += `<div style="font-size:12px; color:#999; margin-left:15px; padding:10px;">Chưa có việc nào...</div>`;
                }

                zoneTasks.forEach(task => {
                    const chatCount = task.chat ? task.chat.length : 0;
                    html += `
                        <div class="task-card" onclick="openTask('${task.id}')">
                            <div class="task-info">
                                <h3>${task.title}</h3>
                                <p>👤 ${task.assignee} | ⏳ Hạn: ${task.deadline || 'Không'}</p>
                            </div>
                            <div class="task-meta">
                                <span class="msg-count">💬 ${chatCount}</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML += html;
            });
        }

        function openTask(id) {
            currentOpenTaskId = id;
            const task = tasks.find(t => t.id === id);
            document.getElementById('modal-task-title').innerText = task.title;
            document.getElementById('modal-task-desc').innerText = task.desc || "Không có mô tả";
            
            document.getElementById('complete-btn').onclick = () => completeTask(id);
            document.getElementById('task-modal').style.display = 'flex';
            renderChat(id);
        }

        function renderChat(id) {
            const task = tasks.find(t => t.id === id);
            const chatBox = document.getElementById('task-chat-box');
            const inputArea = document.getElementById('chat-input-container');
            const warning = document.getElementById('chat-limit-warning');
            
            chatBox.innerHTML = '';
            const messages = task.chat || [];
            
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg ${msg.user === currentUser ? 'sent' : 'received'}`;
                div.innerText = msg.text;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;

            // Giới hạn 10 tin nhắn
            if(messages.length >= 10) {
                inputArea.style.display = 'none';
                warning.style.display = 'block';
            } else {
                inputArea.style.display = 'flex';
                warning.style.display = 'none';
            }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input-msg');
            const text = input.value.trim();
            if(!text) return;

            const task = tasks.find(t => t.id === currentOpenTaskId);
            if(!task.chat) task.chat = [];
            
            task.chat.push({
                user: currentUser,
                text: text,
                time: new Date().toISOString()
            });

            input.value = '';
            renderChat(currentOpenTaskId);
            await saveTasksToCloud();
        }

        async function completeTask(id) {
            const idx = tasks.findIndex(t => t.id === id);
            tasks[idx].completed = true;
            closeModal();
            renderTasks();
            await saveTasksToCloud();
        }

        function showAddTask() {
            const title = prompt("Tên công việc:");
            if(!title) return;
            const zone = prompt("Góc phần tư (red/green/grey):", "red");
            const assignee = prompt("Ai làm (Vợ/Chồng):", currentUser);
            
            const newTask = {
                id: 't' + Date.now(),
                title: title,
                desc: "",
                zone: zone,
                assignee: assignee,
                completed: false,
                chat: []
            };
            
            tasks.push(newTask);
            renderTasks();
            saveTasksToCloud();
        }

        function closeModal(e) {
            if(e && e.target.id !== 'task-modal') return;
            document.getElementById('task-modal').style.display = 'none';
            currentOpenTaskId = null;
        }

        function nav(page) {
            // Sẽ bổ sung logic các page khác ở Module tiếp theo
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('page-title').innerText = page.charAt(0).toUpperCase() + page.slice(1);
        }

        window.onload = init;
    </script>
</body>
</html>
