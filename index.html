<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jika Family — Brain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --ios-blue: #007aff; --ios-red: #ff3b30; --ios-green: #34c759; }
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; margin: 0; padding: 0; }
        .app-container { padding: 20px; padding-top: 60px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn-main { width: 100%; background: var(--ios-blue); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .form-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-top: 10px; box-sizing: border-box; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 1000; }
        .modal-content { background: white; width: 100%; padding: 25px; border-radius: 25px 25px 0 0; }
        header { position: fixed; top: 0; width: 100%; background: white; padding: 15px 20px; box-shadow: 0 1px 10px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .task-item { border-left: 4px solid var(--ios-blue); padding: 10px; margin-bottom: 10px; background: #fafafa; border-radius: 5px; }
        .status-dot { font-size: 10px; color: var(--ios-green); font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div><strong>Jika Family</strong> <span class="status-dot">● ONLINE</span></div>
        <button onclick="testConnection()" style="font-size: 10px; padding: 5px;">Thử kết nối</button>
    </header>

    <div class="app-container">
        <div id="task-list">Đang tải dữ liệu...</div>
        <button class="btn-main" onclick="showAdd()">+ Thêm việc mới</button>
    </div>

    <div id="add-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Việc cần làm</h3>
            <input type="text" id="task-input" class="form-input" placeholder="Nội dung...">
            <button class="btn-main" id="save-btn" onclick="saveNewTask()">LƯU LẠI</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://zxvlthyrahpfzmrnfbib.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dmx0aHlyaGFwZnptcm5mYmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjM2MjYsImV4cCI6MjA5NTc5OTYyNn0.sjJcMt4RkP5nWF2wldAFV1bIp7i56B0EPXlMtEHMkss";
        const _sb = supabase.createClient(SB_URL, SB_KEY);
        let tasks = [];

        async function loadTasks() {
            try {
                const { data, error } = await _sb.from('jika_data').select('*').eq('key', 'jika_tasks').single();
                if (data) tasks = JSON.parse(data.value);
                renderTasks();
            } catch (e) {
                document.getElementById('task-list').innerText = "Chưa có dữ liệu trên Server.";
            }
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.length === 0 ? "Không có việc gì." : "";
            tasks.forEach(t => {
                list.innerHTML += `<div class="task-item"><strong>${t.title}</strong></div>`;
            });
        }

        async function saveNewTask() {
            const input = document.getElementById('task-input');
            const btn = document.getElementById('save-btn');
            if (!input.value.trim()) return;

            btn.disabled = true; btn.innerText = "ĐANG GỬI...";
            const newList = [...tasks, { id: Date.now(), title: input.value.trim() }];

            try {
                // Sử dụng Fetch API trực tiếp để tránh lỗi Load Failed của thư viện
                const response = await fetch(`${SB_URL}/rest/v1/jika_data?key=eq.jika_tasks`, {
                    method: 'POST',
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'resolution=merge-duplicates'
                    },
                    body: JSON.stringify({ key: 'jika_tasks', value: JSON.stringify(newList) })
                });

                if (response.ok) {
                    tasks = newList;
                    renderTasks();
                    input.value = '';
                    document.getElementById('add-modal').style.display = 'none';
                } else {
                    const errText = await response.text();
                    alert("Database từ chối: " + errText);
                }
            } catch (err) {
                alert("LỖI KẾT NỐI: Trình duyệt hoặc Mạng của bạn đã chặn lệnh gửi đi.\n\nHãy thử: Tắt Wifi dùng 4G.");
            } finally {
                btn.disabled = false; btn.innerText = "LƯU LẠI";
            }
        }

        async function testConnection() {
            alert("Đang kiểm tra tới: " + SB_URL);
            try {
                const res = await fetch(SB_URL + "/rest/v1/", { headers: { 'apikey': SB_KEY } });
                if (res.ok) alert("KẾT NỐI THÀNH CÔNG! Database của bạn đã sẵn sàng.");
                else alert("KẾT NỐI THẤT BẠI: Database phản hồi lỗi.");
            } catch (e) {
                alert("KẾT NỐI BỊ CHẶN: Trình duyệt không thể gọi tới Supabase.");
            }
        }

        function showAdd() { document.getElementById('add-modal').style.display = 'flex'; }
        window.onload = loadTasks;
    </script>
</body>
</html>
