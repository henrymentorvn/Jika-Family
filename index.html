<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jika Family — Task Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ios-red: #ff3b30; --ios-blue: #007aff; --ios-green: #34c759; --ios-grey: #8e8e93;
            --glass: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1c1c1e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f5f7fa; color: var(--text-main); overflow: hidden; }
        .mesh-bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(45deg, #ee9ca7, #ffdde1, #2193b0, #6dd5ed); background-size: 400% 400%; animation: gradientBG 15s ease infinite; filter: blur(60px); }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }
        .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 50px 20px 10px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        header h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .user-section { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.4); padding: 5px 12px; border-radius: 25px; border: 1px solid var(--glass-border); }
        .avatar-frame { width: 34px; height: 34px; border-radius: 50%; background: #fff; overflow: hidden; border: 1.5px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-size: 13px; font-weight: 700; }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .section-label { font-size: 12px; font-weight: 800; color: #555; margin: 25px 0 10px 10px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        
        .card { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 18px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .task-card { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .task-info h3 { margin: 0; font-size: 16px; font-weight: 700; }
        .task-info p { margin: 5px 0 0; font-size: 11px; color: #444; font-weight: 500; }
        .msg-count { font-size: 11px; font-weight: 700; background: rgba(0,0,0,0.08); padding: 3px 10px; border-radius: 12px; }

        /* MODAL NÂNG CẤP */
        .modal { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.3); display: none; justify-content: center; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; max-height: 94%; border-radius: 32px 32px 0 0; padding: 25px; display: flex; flex-direction: column; animation: slideUp 0.3s ease; overflow-y: auto; }
        @keyframes slideUp { from {transform: translateY(100%)} to {transform: translateY(0)} }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #777; margin-bottom: 8px; text-transform: uppercase; }
        .form-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #eee; background: #f5f5f7; font-size: 16px; outline: none; font-family: inherit; }
        
        .segmented-control { display: flex; background: #efeff4; border-radius: 14px; padding: 3px; gap: 3px; }
        .segmented-control button { flex: 1; border: none; padding: 12px; border-radius: 11px; font-size: 13px; font-weight: 700; cursor: pointer; color: #666; transition: 0.2s; }
        
        /* Màu đặc trưng khi chọn */
        .zone-btn[data-val="red"].active { background: var(--ios-red); color: white; }
        .zone-btn[data-val="green"].active { background: var(--ios-green); color: white; }
        .zone-btn[data-val="grey"].active { background: var(--ios-grey); color: white; }
        .assign-btn.active { background: white; color: var(--ios-blue); box-shadow: 0 3px 8px rgba(0,0,0,0.1); }

        .row-flex { display: flex; gap: 12px; align-items: flex-end; }
        .row-flex .form-group { flex: 1; margin-bottom: 0; }

        .btn-main { width: 100%; background: var(--ios-blue); color: white; border: none; padding: 18px; border-radius: 20px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .fab { position: fixed; bottom: 100px; right: 20px; width: 64px; height: 64px; border-radius: 32px; background: var(--ios-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 10px 25px rgba(0,122,255,0.4); z-index: 90; border: none; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(25px); border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-around; padding-top: 12px; z-index: 100; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 10px; font-weight: 600; cursor: pointer; flex: 1; }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 26px; margin-bottom: 5px; }

        /* Chat */
        .chat-box { flex: 1; overflow-y: auto; margin: 15px 0; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 14px; max-width: 85%; padding: 12px 16px; border-radius: 20px; line-height: 1.4; }
        .msg.sent { background: var(--ios-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: #e9e9eb; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="app-container">
        <header>
            <div><h1>Task</h1><div style="font-size: 10px; color: var(--ios-green); font-weight: 800;">● ĐỒNG BỘ TRỰC TIẾP</div></div>
            <div class="user-section">
                <span class="user-name" id="display-name">Chồng</span>
                <div class="avatar-frame"><img id="user-avatar" src="" alt="Avatar"></div>
            </div>
        </header>

        <main id="main-content">
            <!-- Render Eisenhower Tasks -->
        </main>

        <button class="fab" onclick="showAddModal()">+</button>

        <div class="tab-bar">
            <div class="tab-item active"><span class="tab-icon">📋</span>Task</div>
            <div class="tab-item" style="opacity: 0.3"><span class="tab-icon">⏳</span>Sự kiện</div>
            <div class="tab-item" style="opacity: 0.3"><span class="tab-icon">💰</span>Tài chính</div>
            <div class="tab-item" style="opacity: 0.3"><span class="tab-icon">🗄️</span>Ngăn Kéo</div>
        </div>
    </div>

    <!-- MODAL ADD TASK -->
    <div id="add-task-modal" class="modal" onclick="closeModal('add-task-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin-top:0">Việc mới</h2>
            <div class="form-group"><label>Tiêu đề việc cần làm ★</label><input type="text" id="task-title-input" class="form-input" placeholder="Ví dụ: Đóng tiền nước"></div>
            
            <div class="form-group"><label>Mức độ ưu tiên</label>
                <div class="segmented-control" id="zone-selector">
                    <button class="zone-btn active" data-val="red">Làm Ngay</button>
                    <button class="zone-btn" data-val="green">Lên Lịch</button>
                    <button class="zone-btn" data-val="grey">Để Sau</button>
                </div>
            </div>

            <div class="row-flex" style="margin-bottom: 20px;">
                <div class="form-group">
                    <label>Đảm nhận</label>
                    <div class="segmented-control" id="assignee-selector">
                        <button class="assign-btn active" data-val="Chồng">Chồng</button>
                        <button class="assign-btn" data-val="Vợ">Vợ</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Hạn chót (Ngày & Giờ)</label>
                    <input type="datetime-local" id="task-deadline-input" class="form-input">
                </div>
            </div>

            <div class="form-group">
                <label>Cảnh báo Telegram khẩn cấp</label>
                <div style="display:flex; gap:8px">
                    <div style="flex:1"><input type="number" id="alert-d" class="form-input" placeholder="0 Ngày"></div>
                    <div style="flex:1"><input type="number" id="alert-h" class="form-input" placeholder="0 Giờ"></div>
                    <div style="flex:1"><input type="number" id="alert-m" class="form-input" placeholder="0 Phút"></div>
                </div>
                <p style="font-size:10px; color:#999; margin-top:5px">Hệ thống sẽ nhắn tin trước hạn chót và nhắc lại mỗi 60p nếu chưa xong.</p>
            </div>

            <button class="btn-main" onclick="saveNewTask()">Lưu công việc ✓</button>
        </div>
    </div>

    <!-- MODAL CHAT -->
    <div id="task-detail-modal" class="modal" onclick="closeModal('task-detail-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; padding-bottom:15px; border-bottom:1px solid #eee;">
                <div><h2 id="dt-title" style="margin:0; font-size:20px;"></h2><p id="dt-info" style="font-size:11px; color:#666; margin-top:5px;"></p></div>
                <button class="btn-main" style="width:auto; padding:10px 20px; font-size:14px;" id="dt-done-btn">Xong</button>
            </div>
            <div class="chat-box" id="chat-box"></div>
            <div style="display:flex; gap:10px; align-items:center;"><input type="text" id="chat-msg-input" class="form-input" placeholder="Thảo luận..." style="flex:1"><button onclick="sendChat()" style="background:var(--ios-blue); border:none; color:white; width:44px; height:44px; border-radius:50%; font-size:22px;">↑</button></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            SB_URL: "https://zxvlthyrahpfzmrnfbib.supabase.co",
            SB_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dmx0aHlyaGFwZnptcm5mYmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjM2MjYsImV4cCI6MjA5NTc5OTYyNn0.sjJcMt4RkP5nWF2wldAFV1bIp7i56B0EPXlMtEHMkss",
            TG_TOKEN: "8188166581:AAFCm486x9i1v_t7rNOf9P9uHq68S4yG6tU",
            TG_CHAT_ID: "-1002587798916",
            AVATARS: {
                "Chồng": "https://lh3.googleusercontent.com/d/1Uv_l3p40A2M_wU0L8Z3W_E_E_f_G_L_8=w1000",
                "Vợ": "https://lh3.googleusercontent.com/d/1_S_t4r3_v5_p_q_W_I_y_L_v_o_v_W_X=w1000"
            }
        };

        const _sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
        let currentUser = localStorage.getItem('jika_user') || 'Chồng';
        let tasks = [], currentDetailId = null;

        async function init() {
            document.getElementById('display-name').innerText = currentUser;
            document.getElementById('user-avatar').src = CONFIG.AVATARS[currentUser];
            setupSegmentedControls();
            await loadTasks();
            setupRealtime();
            setInterval(checkTelegramAlerts, 60000); // Check mỗi phút
        }

        async function loadTasks() {
            const { data } = await _sb.from('jika_data').select('*').eq('key', 'jika_tasks').single();
            if (data) { tasks = JSON.parse(data.value); renderTasks(); }
        }

        function renderTasks() {
            const m = document.getElementById('main-content'); m.innerHTML = '';
            const zones = [{id:'red',l:'LÀM NGAY',c:'var(--ios-red)'},{id:'green',l:'LÊN LỊCH',c:'var(--ios-green)'},{id:'grey',l:'ĐỂ SAU',c:'var(--ios-grey)'}];
            zones.forEach(z => {
                const zt = tasks.filter(t => t.zone === z.id && !t.completed);
                m.innerHTML += `<div class="section-label"><div class="dot" style="background:${z.c}"></div>${z.l}</div>`;
                if(!zt.length) m.innerHTML += `<div style="font-size:11px; color:#aaa; padding:10px 20px;">(Trống)</div>`;
                zt.forEach(t => {
                    m.innerHTML += `<div class="card task-card" onclick="openDetail('${t.id}')">
                        <div class="task-info"><h3>${t.title}</h3><p>👤 ${t.assignee} | ⏳ ${t.deadline?t.deadline.replace('T',' '):'Không hạn'}</p></div>
                        <div class="task-meta"><span class="msg-count">💬 ${t.chat?t.chat.length:0}</span></div>
                    </div>`;
                });
            });
        }

        async function saveNewTask() {
            const title = document.getElementById('task-title-input').value.trim();
            const dl = document.getElementById('task-deadline-input').value;
            if(!title) return;
            tasks.push({
                id:'t'+Date.now(), title, zone:document.querySelector('#zone-selector .active').dataset.val,
                assignee:document.querySelector('#assignee-selector .active').dataset.val,
                deadline: dl,
                alertBefore: { d:document.getElementById('alert-d').value||0, h:document.getElementById('alert-h').value||0, m:document.getElementById('alert-m').value||0 },
                completed:false, chat:[], lastAlertTime: 0
            });
            await syncTasks(); closeModal('add-task-modal');
        }

        async function checkTelegramAlerts() {
            const now = Date.now();
            let changed = false;
            for(let t of tasks) {
                if(t.completed || !t.deadline) continue;
                const deadlineTime = new Date(t.deadline).getTime();
                const alertBeforeMs = (t.alertBefore.d * 86400 + t.alertBefore.h * 3600 + t.alertBefore.m * 60) * 1000;
                const triggerTime = deadlineTime - alertBeforeMs;

                // Nếu đến thời điểm cảnh báo VÀ (chưa báo bao giờ HOẶC đã quá 60 phút từ lần báo trước)
                if(now >= triggerTime && (now - (t.lastAlertTime || 0) > 3600000)) {
                    await sendTG(`🚨 <b>CẢNH BÁO KHẨN CẤP</b>\n📌 Việc: ${t.title}\n👤 Phụ trách: ${t.assignee}\n⏳ Hạn chót: ${t.deadline.replace('T',' ')}\n\n👉 <i>Vui lòng hoàn thành ngay!</i>`);
                    t.lastAlertTime = now;
                    changed = true;
                }
            }
            if(changed) await syncTasks();
        }

        async function sendTG(msg) {
            await fetch(`https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage?chat_id=${CONFIG.TG_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`);
        }

        async function syncTasks() { await _sb.from('jika_data').upsert({key:'jika_tasks', value:JSON.stringify(tasks)}); renderTasks(); }
        function setupRealtime() { _sb.channel('jika_tasks').on('postgres_changes', {event:'*', schema:'public', table:'jika_data'}, payload => { if(payload.new.key==='jika_tasks'){ tasks=JSON.parse(payload.new.value); renderTasks(); if(currentDetailId) renderChat(currentDetailId); } }).subscribe(); }
        function showAddModal() { document.getElementById('add-task-modal').style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; if(id==='task-detail-modal') currentDetailId=null; }
        function setupSegmentedControls() { document.querySelectorAll('.segmented-control button').forEach(b => b.onclick = function(){ this.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('active')); this.classList.add('active'); }); }
        function openDetail(id) { currentDetailId=id; const t=tasks.find(x=>x.id===id); document.getElementById('dt-title').innerText=t.title; document.getElementById('dt-info').innerText=`Người làm: ${t.assignee} | Hạn: ${t.deadline||'Không'}`; document.getElementById('dt-done-btn').onclick=()=>finishTask(id); document.getElementById('task-detail-modal').style.display='flex'; renderChat(id); }
        function renderChat(id) { const t=tasks.find(x=>x.id===id); const b=document.getElementById('chat-box'); b.innerHTML=''; (t.chat||[]).forEach(m=> b.innerHTML+=`<div class="msg ${m.user===currentUser?'sent':'received'}">${m.text}</div>`); b.scrollTop=b.scrollHeight; }
        async function sendChat() { const i=document.getElementById('chat-msg-input'); if(!i.value.trim())return; const t=tasks.find(x=>x.id===currentDetailId); if(!t.chat)t.chat=[]; t.chat.push({user:currentUser, text:i.value.trim()}); i.value=''; renderChat(currentDetailId); await syncTasks(); }
        async function finishTask(id) { tasks.find(x=>x.id===id).completed=true; closeModal('task-detail-modal'); await syncTasks(); }
        window.onload = init;
    </script>
</body>
</html>
