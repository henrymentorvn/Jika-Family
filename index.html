<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jika Family — Digital Brain</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --ios-red: #ff3b30;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-grey: #8e8e93;
            --glass: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #1c1c1e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed;
            color: var(--text-main);
            overflow: hidden;
        }

        /* Hình nền động mờ ảo */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #ee9ca7, #ffdde1, #2193b0, #6dd5ed);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            filter: blur(50px);
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* Header */
        header {
            padding: 50px 20px 10px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        .user-badge {
            background: var(--glass); padding: 5px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 600;
            border: 1px solid var(--glass-border);
            cursor: pointer;
        }

        /* Main Content */
        main {
            flex: 1; overflow-y: auto; padding: 15px;
            padding-bottom: 120px;
        }

        /* Mood Overlay */
        #mood-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s ease;
        }
        .mood-card {
            background: white; padding: 30px; border-radius: 35px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 85%; max-width: 320px;
        }
        .mood-options { display: flex; justify-content: space-around; margin-top: 25px; }
        .mood-btn { 
            font-size: 45px; cursor: pointer; border: none; background: none;
            transition: transform 0.2s;
        }
        .mood-btn:active { transform: scale(0.8); }

        /* Eisenhower Sections */
        .section-label {
            font-size: 13px; font-weight: 700; color: #555;
            margin: 15px 0 8px 10px; display: flex; align-items: center; gap: 6px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Task Card */
        .task-card {
            background: var(--glass);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 15px; margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .task-info h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .task-info p { margin: 4px 0 0; font-size: 11px; color: #555; }
        .task-meta { display: flex; gap: 10px; align-items: center; }
        .msg-count { font-size: 12px; background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 10px; }

        /* Form & Modals */
        .modal {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.4); display: none;
            justify-content: center; align-items: flex-end;
        }
        .modal-content {
            background: white; width: 100%; max-height: 90%;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 20px; display: flex; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 5px; }
        .form-input {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid #eee; background: #f9f9f9; font-size: 15px; outline: none;
        }
        .segmented-control {
            display: flex; background: #f0f0f0; border-radius: 10px; padding: 2px;
        }
        .segmented-control button {
            flex: 1; border: none; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .segmented-control button.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--ios-blue); }

        .btn-main {
            width: 100%; background: var(--ios-blue); color: white; border: none;
            padding: 15px; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer;
        }

        /* Floating Button */
        .fab {
            position: fixed; bottom: 100px; right: 20px;
            width: 56px; height: 56px; border-radius: 28px;
            background: var(--ios-blue); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 10px 20px rgba(0,122,255,0.3);
            cursor: pointer; z-index: 100; border: none;
        }

        /* Tab Bar */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; padding-top: 10px;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center;
            color: #666; font-size: 10px; font-weight: 500; cursor: pointer;
        }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 24px; margin-bottom: 4px; }

        /* Chat styles */
        .chat-box { flex: 1; overflow-y: auto; margin: 15px 0; }
        .msg { margin-bottom: 8px; font-size: 14px; max-width: 80%; padding: 8px 12px; border-radius: 15px; position: relative; }
        .msg.sent { background: var(--ios-blue); color: white; align-self: flex-end; margin-left: auto; }
        .msg.received { background: #e9e9eb; color: black; }

        @media (min-width: 500px) {
            body { display: flex; justify-content: center; background: #000; }
            .app-container { width: 375px; height: 812px; margin-top: 50px; border-radius: 40px; overflow: hidden; position: relative; border: 8px solid #333; }
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <!-- MÀN HÌNH CHÀO MỪNG / CẢM XÚC -->
    <div id="mood-overlay">
        <div class="mood-card">
            <h2 id="mood-user-name">Chào bạn ❤️</h2>
            <p style="color: #666; font-size: 14px;">Cảm xúc của bạn lúc này?</p>
            <div class="mood-options">
                <button class="mood-btn" onclick="saveMood('😊')">😊</button>
                <button class="mood-btn" onclick="saveMood('😐')">😐</button>
                <button class="mood-btn" onclick="saveMood('😠')">😠</button>
            </div>
            <button onclick="closeMood()" style="margin-top: 20px; background: none; border: none; color: #999; font-size: 12px;">Bỏ qua</button>
        </div>
    </div>

    <div class="app-container">
        <header>
            <div>
                <h1 id="page-title">Công việc</h1>
                <div id="sync-indicator" style="font-size: 10px; color: var(--ios-green);">● Đồng bộ trực tiếp</div>
            </div>
            <div class="user-badge" id="role-toggle" onclick="switchUser()">Chồng</div>
        </header>

        <main id="main-content">
            <!-- Render Eisenhower Matrix -->
        </main>

        <button class="fab" onclick="showAddTask()">+</button>

        <div class="tab-bar">
            <div class="tab-item active" onclick="nav('tasks')">
                <span class="tab-icon">📋</span> Eisenhower
            </div>
            <div class="tab-item" onclick="nav('events')">
                <span class="tab-icon">⏳</span> Sự kiện
            </div>
            <div class="tab-item" onclick="nav('finance')">
                <span class="tab-icon">💰</span> Tài chính
            </div>
            <div class="tab-item" onclick="nav('vault')">
                <span class="tab-icon">👤</span> Tủ mật
            </div>
        </div>
    </div>

    <!-- MODAL THÊM CÔNG VIỆC MỚI -->
    <div id="add-task-modal" class="modal" onclick="closeAddTask(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin-top: 0; font-size: 20px;">Thêm việc mới</h2>
            
            <div class="form-group">
                <label>Tiêu đề việc cần làm ★</label>
                <input type="text" id="task-title-input" class="form-input" placeholder="Ví dụ: Đóng tiền điện">
            </div>

            <div class="form-group">
                <label>Ghi chú chi tiết</label>
                <textarea id="task-desc-input" class="form-input" rows="2" placeholder="Thêm mô tả nếu cần..."></textarea>
            </div>

            <div class="form-group">
                <label>Mức độ ưu tiên</label>
                <div class="segmented-control" id="zone-selector">
                    <button class="active" data-val="red">Làm Ngay</button>
                    <button data-val="green">Lên Lịch</button>
                    <button data-val="grey">Để Sau</button>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1">
                    <label>Người phụ trách</label>
                    <div class="segmented-control" id="assignee-selector">
                        <button class="active" data-val="Chồng">Chồng</button>
                        <button data-val="Vợ">Vợ</button>
                    </div>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Hạn hoàn thành</label>
                    <input type="date" id="task-deadline-input" class="form-input" style="padding: 9px;">
                </div>
            </div>

            <button class="btn-main" onclick="saveNewTask()">Lưu công việc ✓</button>
            <button onclick="closeAddTask(null)" style="background:none; border:none; margin-top:10px; color:#999; font-size:14px; cursor:pointer;">Để sau</button>
        </div>
    </div>

    <!-- MODAL CHI TIẾT & CHAT -->
    <div id="task-detail-modal" class="modal" onclick="closeDetail(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; padding-bottom:10px; border-bottom:1px solid #f0f0f0;">
                <div>
                    <h2 id="dt-title" style="margin: 0; font-size: 20px;"></h2>
                    <p id="dt-info" style="font-size: 12px; color: #666; margin-top: 5px;"></p>
                </div>
                <button class="btn-main" style="width:auto; padding:8px 15px; font-size:14px;" id="dt-done-btn">Xong</button>
            </div>

            <div id="chat-limit-warning" style="display:none; color: var(--ios-red); font-size: 11px; text-align: center; padding: 8px; background: #fff1f0; border-radius: 10px; margin-top: 10px;">
                ⚠️ Đã chat 10 câu. Hai bạn nên nói chuyện trực tiếp nhé!
            </div>

            <div class="chat-box" id="chat-box"></div>

            <div class="chat-input-area" id="chat-input-area" style="display:flex; gap:10px;">
                <input type="text" id="chat-msg-input" class="form-input" placeholder="Viết phản hồi..." style="flex:1">
                <button onclick="sendChat()" style="background: var(--ios-blue); border: none; color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 20px;">↑</button>
            </div>
            <div style="height: 10px;"></div>
        </div>
    </div>

    <script>
        // CẤU HÌNH
        const SB_URL = "https://zxvlthyrahpfzmrnfbib.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dmx0aHlyaGFwZnptcm5mYmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjM2MjYsImV4cCI6MjA5NTc5OTYyNn0.sjJcMt4RkP5nWF2wldAFV1bIp7i56B0EPXlMtEHMkss";
        
        let _sbClient = supabase.createClient(SB_URL, SB_KEY);
        let currentUser = localStorage.getItem('jika_user') || 'Chồng';
        let tasks = [];
        let currentDetailId = null;

        // KHỞI TẠO
        async function init() {
            document.getElementById('role-toggle').innerText = currentUser;
            document.getElementById('mood-user-name').innerText = `Chào ${currentUser} ❤️`;
            
            // Xử lý nút chọn Segmented Control
            setupSegmentedControls();
            
            await loadTasks();
            setupRealtime();
        }

        function setupSegmentedControls() {
            document.querySelectorAll('.segmented-control button').forEach(btn => {
                btn.onclick = function() {
                    this.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                };
            });
        }

        async function loadTasks() {
            const { data } = await _sbClient.from('jika_data').select('*').eq('key', 'jika_tasks').single();
            if (data) {
                tasks = JSON.parse(data.value);
                renderTasks();
            }
        }

        async function syncTasks() {
            await _sbClient.from('jika_data').upsert({ key: 'jika_tasks', value: JSON.stringify(tasks) });
        }

        function setupRealtime() {
            _sbClient.channel('jika_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'jika_data' }, payload => {
                if (payload.new && payload.new.key === 'jika_tasks') {
                    tasks = JSON.parse(payload.new.value);
                    renderTasks();
                    if(currentDetailId) renderChat(currentDetailId);
                }
            }).subscribe();
        }

        // UI LOGIC
        function switchUser() {
            currentUser = (currentUser === 'Chồng') ? 'Vợ' : 'Chồng';
            localStorage.setItem('jika_user', currentUser);
            document.getElementById('role-toggle').innerText = currentUser;
            document.getElementById('mood-user-name').innerText = `Chào ${currentUser} ❤️`;
            document.getElementById('mood-overlay').style.display = 'flex';
            document.getElementById('mood-overlay').style.opacity = '1';
        }

        function closeMood() {
            document.getElementById('mood-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('mood-overlay').style.display = 'none', 500);
        }

        function saveMood(mood) {
            console.log("Mood: ", mood);
            closeMood();
        }

        function renderTasks() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            const zones = [
                { id: 'red', label: 'LÀM NGAY', color: 'var(--ios-red)' },
                { id: 'green', label: 'LÊN LỊCH', color: 'var(--ios-green)' },
                { id: 'grey', label: 'ĐỂ SAU', color: 'var(--ios-grey)' }
            ];

            zones.forEach(zone => {
                const zoneTasks = tasks.filter(t => t.zone === zone.id && !t.completed);
                let html = `<div class="section-label"><div class="dot" style="background:${zone.color}"></div>${zone.label}</div>`;
                
                if(zoneTasks.length === 0) {
                    html += `<div style="font-size:12px; color:#aaa; margin-left:10px; padding:10px;">(Trống)</div>`;
                }

                zoneTasks.forEach(t => {
                    const count = t.chat ? t.chat.length : 0;
                    const dateInfo = t.deadline ? formatDate(t.deadline) : 'Không hạn';
                    html += `
                        <div class="task-card" onclick="openDetail('${t.id}')">
                            <div class="task-info">
                                <h3>${t.title}</h3>
                                <p>👤 ${t.assignee} | ⏳ Hạn: ${dateInfo}</p>
                            </div>
                            <div class="task-meta">
                                <span class="msg-count">💬 ${count}</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML += html;
            });
        }

        function showAddTask() {
            document.getElementById('add-task-modal').style.display = 'flex';
        }

        function closeAddTask(e) {
            if(e && e.target.id !== 'add-task-modal') return;
            document.getElementById('add-task-modal').style.display = 'none';
        }

        async function saveNewTask() {
            const title = document.getElementById('task-title-input').value.trim();
            if(!title) { alert("Nhập tiêu đề nhé!"); return; }

            const zone = document.querySelector('#zone-selector button.active').dataset.val;
            const assignee = document.querySelector('#assignee-selector button.active').dataset.val;
            const deadline = document.getElementById('task-deadline-input').value;
            const desc = document.getElementById('task-desc-input').value.trim();

            const newTask = {
                id: 't' + Date.now(),
                title: title,
                desc: desc,
                zone: zone,
                assignee: assignee,
                deadline: deadline,
                completed: false,
                chat: []
            };

            tasks.push(newTask);
            document.getElementById('task-title-input').value = '';
            document.getElementById('task-desc-input').value = '';
            closeAddTask(null);
            renderTasks();
            await syncTasks();
        }

        function openDetail(id) {
            currentDetailId = id;
            const t = tasks.find(x => x.id === id);
            document.getElementById('dt-title').innerText = t.title;
            document.getElementById('dt-info').innerText = `Phụ trách: ${t.assignee} | Hạn: ${t.deadline || 'Chưa set'}`;
            document.getElementById('dt-done-btn').onclick = () => finishTask(id);
            document.getElementById('task-detail-modal').style.display = 'flex';
            renderChat(id);
        }

        function closeDetail(e) {
            if(e && e.target.id !== 'task-detail-modal') return;
            document.getElementById('task-detail-modal').style.display = 'none';
            currentDetailId = null;
        }

        function renderChat(id) {
            const t = tasks.find(x => x.id === id);
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            
            const msgs = t.chat || [];
            msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.user === currentUser ? 'sent' : 'received'}`;
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;

            // Giới hạn 10 câu
            const inputArea = document.getElementById('chat-input-area');
            const warn = document.getElementById('chat-limit-warning');
            if(msgs.length >= 10) {
                inputArea.style.display = 'none';
                warn.style.display = 'block';
            } else {
                inputArea.style.display = 'flex';
                warn.style.display = 'none';
            }
        }

        async function sendChat() {
            const input = document.getElementById('chat-msg-input');
            const text = input.value.trim();
            if(!text) return;

            const t = tasks.find(x => x.id === currentDetailId);
            if(!t.chat) t.chat = [];
            t.chat.push({ user: currentUser, text: text });
            
            input.value = '';
            renderChat(currentDetailId);
            await syncTasks();
        }

        async function finishTask(id) {
            const idx = tasks.findIndex(x => x.id === id);
            tasks[idx].completed = true;
            closeDetail(null);
            renderTasks();
            await syncTasks();
        }

        function formatDate(d) {
            const parts = d.split('-');
            return `${parts[2]}/${parts[1]}`;
        }

        function nav(page) {
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('page-title').innerText = 
                page === 'tasks' ? 'Công việc' : 
                page === 'events' ? 'Sự kiện' : 
                page === 'finance' ? 'Tài chính' : 'Tủ mật';
        }

        window.onload = init;
    </script>
</body>
</html>
