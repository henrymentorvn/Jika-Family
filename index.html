<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jika Family — Digital Brain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ios-red: #ff3b30; --ios-blue: #007aff; --ios-green: #34c759; --ios-grey: #8e8e93;
            --glass: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1c1c1e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f5f7fa; color: var(--text-main); overflow: hidden; }
        
        .mesh-bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(45deg, #ee9ca7, #ffdde1, #2193b0, #6dd5ed); background-size: 400% 400%; animation: gradientBG 15s ease infinite; filter: blur(60px); }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 50px 20px 15px; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        header h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .sync-status { font-size: 10px; color: var(--ios-green); font-weight: 800; text-transform: uppercase; margin-top: 4px; }

        .user-section { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.5); padding: 6px 14px; border-radius: 25px; border: 1px solid var(--glass-border); cursor: pointer; }
        .avatar-frame { width: 34px; height: 34px; border-radius: 50%; background: #fff; overflow: hidden; border: 1.5px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-size: 13px; font-weight: 700; color: #333; }

        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; scroll-behavior: smooth; }
        
        .section-label { font-size: 12px; font-weight: 800; color: #444; margin: 25px 0 12px 10px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        .card { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 18px; margin-bottom: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); transition: 0.2s; }
        .task-card { display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .task-card:active { transform: scale(0.97); }
        .task-info h3 { margin: 0; font-size: 17px; font-weight: 700; color: #1c1c1e; }
        .task-info p { margin: 5px 0 0; font-size: 11px; color: #555; font-weight: 600; }
        .msg-count { font-size: 11px; font-weight: 800; background: rgba(0,0,0,0.08); padding: 3px 10px; border-radius: 12px; }

        .modal { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.3); display: none; justify-content: center; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; max-height: 94%; border-radius: 32px 32px 0 0; padding: 25px; display: flex; flex-direction: column; animation: slideUp 0.3s cubic-bezier(0, 0.5, 0.5, 1); overflow-y: auto; }
        @keyframes slideUp { from {transform: translateY(100%)} to {transform: translateY(0)} }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #999; margin-bottom: 8px; text-transform: uppercase; }
        .form-input { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid #eee; background: #f5f5f7; font-size: 16px; outline: none; font-family: inherit; }

        .segmented-control { display: flex; background: #efeff4; border-radius: 16px; padding: 3px; gap: 3px; }
        .segmented-control button { flex: 1; border: none; padding: 10px 5px; border-radius: 13px; font-size: 12px; font-weight: 700; cursor: pointer; color: #666; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .segmented-control button span { font-size: 8px; font-weight: 500; opacity: 0.7; margin-top: 2px; }
        .zone-btn[data-val="red"].active { background: var(--ios-red); color: white; }
        .zone-btn[data-val="green"].active { background: var(--ios-green); color: white; }
        .zone-btn[data-val="grey"].active { background: var(--ios-grey); color: white; }
        .assign-btn.active { background: white; color: var(--ios-blue); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }

        .btn-main { width: 100%; background: var(--ios-blue); color: white; border: none; padding: 18px; border-radius: 22px; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }

        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-around; padding-top: 12px; z-index: 100; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 10px; font-weight: 600; cursor: pointer; flex: 1; transition: 0.2s; }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 24px; margin-bottom: 5px; }

        .fab { position: fixed; bottom: 105px; right: 20px; width: 64px; height: 64px; border-radius: 32px; background: var(--ios-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 10px 25px rgba(0,122,255,0.4); z-index: 90; border: none; cursor: pointer; }

        /* CHAT UI */
        .chat-box { flex: 1; overflow-y: auto; margin: 15px 0; display: flex; flex-direction: column; gap: 8px; padding: 5px; }
        .msg { font-size: 14px; max-width: 85%; padding: 12px 16px; border-radius: 20px; line-height: 1.4; }
        .msg.sent { background: var(--ios-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: #e9e9eb; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        #chat-limit-warning { display: none; color: var(--ios-red); font-size: 11px; text-align: center; padding: 12px; background: #fff1f0; border-radius: 12px; margin: 10px 0; font-weight: 700; line-height: 1.4; }
        
        #mood-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(255,255,255,0.1); backdrop-filter: blur(40px); display: none; flex-direction: column; justify-content: center; align-items: center; }
        .mood-card { background: white; padding: 40px 30px; border-radius: 45px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.15); width: 88%; max-width: 340px; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>

    <!-- MOOD CHECK-IN -->
    <div id="mood-overlay"><div class="mood-card">
        <h2 id="mood-user-name">Chào ❤️</h2><p style="color: #666; font-size: 14px;">Cảm xúc của bạn lúc này?</p>
        <div style="display: flex; justify-content: space-around; margin-top: 30px;">
            <button onclick="saveMood('😊')" style="font-size: 55px; border:none; background:none; cursor:pointer;">😊</button>
            <button onclick="saveMood('😐')" style="font-size: 55px; border:none; background:none; cursor:pointer;">😐</button>
            <button onclick="saveMood('😠')" style="font-size: 55px; border:none; background:none; cursor:pointer;">😠</button>
        </div>
    </div></div>

    <div class="app-container">
        <header>
            <div><h1 id="page-title">Task</h1><div id="sync-status" class="sync-status">● LIVE SYNC</div></div>
            <div class="user-section" onclick="switchUserPrompt()">
                <div class="avatar-frame"><img id="user-avatar" src=""></div>
                <span class="user-name" id="display-name">---</span>
            </div>
        </header>

        <main id="main-content"></main>

        <button id="add-fab" class="fab" onclick="showAddModal()">+</button>

        <div class="tab-bar">
            <div class="tab-item active" onclick="nav('tasks', this)"><div class="tab-icon">📋</div>Task</div>
            <div class="tab-item" onclick="nav('events', this)"><div class="tab-icon">⏳</div>Sự kiện</div>
            <div class="tab-item" onclick="nav('finance', this)"><div class="tab-icon">💰</div>Tài chính</div>
            <div class="tab-item" onclick="nav('vault', this)"><div class="tab-icon">🗄️</div>Ngăn Kéo</div>
        </div>
    </div>

    <!-- MODAL ADD TASK -->
    <div id="add-task-modal" class="modal" onclick="closeModal('add-task-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin:0 0 20px">Việc mới</h2>
            <div class="form-group"><label>Tiêu đề việc cần làm ★</label><input type="text" id="task-title-input" class="form-input" placeholder="Bạn cần làm gì?"></div>
            <div class="form-group"><label>Mức độ ưu tiên (Eisenhower)</label>
                <div class="segmented-control" id="zone-selector">
                    <button class="zone-btn active" data-val="red">LÀM NGAY<span>Khẩn cấp</span></button>
                    <button class="zone-btn" data-val="green">LÊN LỊCH<span>Quan trọng</span></button>
                    <button class="zone-btn" data-val="grey">ĐỂ SAU<span>Lặt vặt</span></button>
                </div>
            </div>
            <div style="display:flex; gap:12px">
                <div class="form-group" style="flex:1"><label>Đảm nhận</label>
                    <div class="segmented-control" id="assignee-selector">
                        <button class="assign-btn active" data-val="Chồng">Chồng</button>
                        <button class="assign-btn" data-val="Vợ">Vợ</button>
                    </div>
                </div>
                <div class="form-group" style="flex:1"><label>Hạn chót</label><input type="datetime-local" id="task-deadline-input" class="form-input" style="padding:12px"></div>
            </div>
            <button class="btn-main" id="btn-save-task" onclick="saveNewTask()">LƯU CÔNG VIỆC ✓</button>
        </div>
    </div>

    <!-- MODAL CHAT & DETAIL -->
    <div id="task-detail-modal" class="modal" onclick="closeModal('task-detail-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; padding-bottom:15px; border-bottom:1px solid #eee;">
                <div style="flex:1; padding-right:10px;"><h2 id="dt-title" style="margin:0; font-size:20px; line-height:1.2;"></h2><p id="dt-info" style="font-size:11px; color:#666; margin-top:5px;"></p></div>
                <button class="btn-main" style="width:auto; padding:10px 20px; font-size:14px; margin:0;" id="dt-done-btn">Xong</button>
            </div>
            <div id="chat-limit-warning"></div>
            <div class="chat-box" id="chat-box"></div>
            <div id="chat-input-area" style="display:flex; gap:10px; align-items:center;">
                <input type="text" id="chat-msg-input" class="form-input" placeholder="Thảo luận..." style="margin:0">
                <button onclick="sendChat()" style="background:var(--ios-blue); border:none; color:white; width:48px; height:48px; border-radius:24px; font-size:22px;">↑</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            SB_URL: "https://zxvlthyrahpfzmrnfbib.supabase.co",
            SB_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dmx0aHlyaGFwZnptcm5mYmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjM2MjYsImV4cCI6MjA5NTc5OTYyNn0.sjJcMt4RkP5nWF2wldAFV1bIp7i56B0EPXlMtEHMkss",
            TG_TOKEN: "8188166581:AAFCm486x9i1v_t7rNOf9P9uHq68S4yG6tU",
            TG_CHAT_ID: "-1002587798916",
            VAULT_PIN: "0561000963557",
            SWITCH_PIN: "0000",
            AVATARS: { "Chồng": "https://lh3.googleusercontent.com/d/1Uv_l3p40A2M_wU0L8Z3W_E_E_f_G_L_8=w1000", "Vợ": "https://lh3.googleusercontent.com/d/1_S_t4r3_v5_p_q_W_I_y_L_v_o_v_W_X=w1000" }
        };

        const _sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
        let currentUser = localStorage.getItem('jika_user') || 'Chồng';
        let tasks = [], currentDetailId = null, currentTab = 'tasks', isHistoryView = false;

        async function init() {
            document.getElementById('display-name').innerText = currentUser;
            document.getElementById('user-avatar').src = CONFIG.AVATARS[currentUser];
            document.getElementById('mood-user-name').innerText = `Chào ${currentUser} ❤️`;
            setupSegmentedControls();
            await loadAll();
            checkMoodCheckin();
            setupRealtime();
        }

        async function loadAll() {
            const { data } = await _sb.from('jika_data').select('*');
            if(data) data.forEach(i => { if(i.key==='jika_tasks') tasks = JSON.parse(i.value || "[]"); });
            renderCurrentTab();
        }

        function setupRealtime() {
            _sb.channel('jika_core').on('postgres_changes', {event:'*', schema:'public', table:'jika_data'}, payload => {
                if(payload.new.key === 'jika_tasks') {
                    tasks = JSON.parse(payload.new.value || "[]");
                    if(currentTab === 'tasks') renderTasks();
                    if(currentDetailId) renderChat(currentDetailId);
                    document.getElementById('sync-status').innerText = "● ĐÃ ĐỒNG BỘ " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                }
            }).subscribe();
        }

        function renderCurrentTab() {
            const m = document.getElementById('main-content'); m.innerHTML = '';
            document.getElementById('add-fab').style.display = (currentTab==='tasks') ? 'flex' : 'none';
            if(currentTab === 'tasks') renderTasks();
            else m.innerHTML = `<div style="text-align:center; padding:100px; color:#aaa; font-size:14px;">Module ${currentTab} sẽ được hoàn thiện tiếp theo.</div>`;
        }

        function renderTasks() {
            const m = document.getElementById('main-content');
            m.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding:0 10px;">
                    <div class="section-label" style="margin:0">${isHistoryView ? 'KHO LƯU TRỮ' : 'VIỆC CẦN LÀM'}</div>
                    <button onclick="toggleHistory()" style="background:rgba(255,255,255,0.7); border:1px solid var(--glass-border); padding:8px 15px; border-radius:12px; font-size:12px; font-weight:700; cursor:pointer;">
                        ${isHistoryView ? '← Hiện tại' : '🕒 Lịch sử'}
                    </button>
                </div>
            `;

            const zones = [{id:'red',l:'LÀM NGAY',c:'var(--ios-red)'},{id:'green',l:'LÊN LỊCH',c:'var(--ios-green)'},{id:'grey',l:'ĐỂ SAU',c:'var(--ios-grey)'}];
            zones.forEach(z => {
                const zt = tasks.filter(t => t.zone === z.id && (!!t.completed === isHistoryView));
                if(zt.length > 0) {
                    m.innerHTML += `<div class="section-label"><div class="dot" style="background:${z.c}"></div>${z.l}</div>`;
                    zt.forEach(t => {
                        const isOverdue = t.deadline && new Date(t.deadline) < new Date() && !t.completed;
                        m.innerHTML += `
                            <div class="card task-card" onclick="openDetail('${t.id}')" style="${isOverdue ? 'border: 1.5px solid var(--ios-red);' : ''}">
                                <div style="display:flex; align-items:center; gap:12px;">
                                    <div class="avatar-frame" style="width:32px; height:32px;"><img src="${CONFIG.AVATARS[t.assignee]}"></div>
                                    <div class="task-info">
                                        <h3 style="${t.completed ? 'text-decoration:line-through; color:#888;' : ''}">${t.title}</h3>
                                        <p>${isOverdue ? '🚨 QUÁ HẠN | ' : ''}👤 ${t.assignee} | ⏳ ${t.deadline ? t.deadline.replace('T',' ') : 'Không hạn'}</p>
                                    </div>
                                </div>
                                <div class="task-meta"><span class="msg-count" style="${(t.chat && t.chat.length >= 9) ? 'background:var(--ios-red); color:white;' : ''}">💬 ${t.chat ? t.chat.length : 0}</span></div>
                            </div>`;
                    });
                }
            });
            if (m.innerHTML.indexOf('task-card') === -1) m.innerHTML += `<div style="text-align:center; padding:60px; color:#aaa; font-size:13px;">(Trống)</div>`;
        }

        async function saveNewTask() {
            const title = document.getElementById('task-title-input').value.trim();
            if(!title) return;
            const btn = document.getElementById('btn-save-task');
            btn.disabled = true; btn.innerText = "LƯU...";

            const newTask = {
                id: 't'+Date.now(), title, zone: document.querySelector('#zone-selector .active').dataset.val,
                assignee: document.querySelector('#assignee-selector .active').dataset.val,
                deadline: document.getElementById('task-deadline-input').value,
                completed: false, chat: []
            };

            const { error } = await _sb.from('jika_data').upsert({ key: 'jika_tasks', value: JSON.stringify([...tasks, newTask]) });
            if(!error) {
                document.getElementById('task-title-input').value = '';
                closeModal('add-task-modal');
                fetch(`https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage?chat_id=${CONFIG.TG_CHAT_ID}&text=${encodeURIComponent(`📌 <b>VIỆC MỚI</b>\n📍 ${newTask.title}\n👤 Phụ trách: ${newTask.assignee}`)}&parse_mode=HTML`).catch(e=>{});
            }
            btn.disabled = false; btn.innerText = "LƯU CÔNG VIỆC ✓";
        }

        function openDetail(id) {
            currentDetailId = id; const t = tasks.find(x => x.id === id);
            document.getElementById('dt-title').innerText = t.title;
            document.getElementById('dt-info').innerText = `${t.assignee} | Hạn: ${t.deadline || 'Không'}`;
            const btn = document.getElementById('dt-done-btn');
            btn.innerText = t.completed ? "Khôi phục" : "Xong";
            btn.style.background = t.completed ? "var(--ios-grey)" : "var(--ios-blue)";
            btn.onclick = () => updateStatus(id, !t.completed);
            document.getElementById('task-detail-modal').style.display = 'flex';
            renderChat(id);
        }

        async function updateStatus(id, st) {
            const idx = tasks.findIndex(x => x.id === id);
            tasks[idx].completed = st;
            await _sb.from('jika_data').upsert({ key: 'jika_tasks', value: JSON.stringify(tasks) });
            closeModal('task-detail-modal');
        }

        function renderChat(id) {
            const t = tasks.find(x => x.id === id);
            const b = document.getElementById('chat-box');
            const warn = document.getElementById('chat-limit-warning');
            const area = document.getElementById('chat-input-area');
            b.innerHTML = ''; (t.chat || []).forEach(m => b.innerHTML += `<div class="msg ${m.user===currentUser?'sent':'received'}">${m.text}</div>`);
            b.scrollTop = b.scrollHeight;

            const len = (t.chat || []).length;
            if(len >= 10) {
                warn.style.display='block'; warn.innerHTML="🚫 Đã đạt giới hạn 10 câu thảo luận.<br>Nhấc máy gọi cho nhau ngay để tránh hiểu lầm!";
                area.style.display='none';
            } else {
                warn.style.display = (len === 9 ? 'block' : 'none');
                if(len === 9) warn.innerText = "⚠️ Lượt thảo luận cuối cùng!";
                area.style.display='flex';
            }
        }

        async function sendChat() {
            const i = document.getElementById('chat-msg-input'); if(!i.value.trim()) return;
            const idx = tasks.findIndex(x => x.id === currentDetailId);
            if(!tasks[idx].chat) tasks[idx].chat = [];
            tasks[idx].chat.push({ user: currentUser, text: i.value.trim() });
            const txt = i.value; i.value = '';
            await _sb.from('jika_data').upsert({ key: 'jika_tasks', value: JSON.stringify(tasks) });
            fetch(`https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage?chat_id=${CONFIG.TG_CHAT_ID}&text=${encodeURIComponent(`💬 <b>${currentUser}</b> nhắn trong ${tasks[idx].title}:\n"${txt}"`)}&parse_mode=HTML`).catch(e=>{});
        }

        function toggleHistory() { isHistoryView = !isHistoryView; renderTasks(); }
        function nav(p, el) { 
            currentTab = p; isHistoryView = false;
            document.querySelectorAll('.tab-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); 
            document.getElementById('page-title').innerText = el.innerText.trim(); renderCurrentTab(); 
        }
        function showAddModal() { document.getElementById('add-task-modal').style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; currentDetailId=null; }
        function setupSegmentedControls() {
            document.querySelectorAll('.segmented-control button').forEach(b => b.onclick = function() {
                this.parentElement.querySelectorAll('button').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
            });
        }
        function checkMoodCheckin() { if(!localStorage.getItem('jika_mood_time') || Date.now() - localStorage.getItem('jika_mood_time') > 3600000) document.getElementById('mood-overlay').style.display='flex'; }
        async function saveMood(m) { 
            localStorage.setItem('jika_mood_time', Date.now()); 
            document.getElementById('mood-overlay').style.display='none'; 
            fetch(`https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage?chat_id=${CONFIG.TG_CHAT_ID}&text=${encodeURIComponent(`🎭 <b>Tâm trạng:</b> ${currentUser} chọn ${m}`)}&parse_mode=HTML`).catch(e=>{}); 
        }
        function switchUserPrompt() { if(prompt("PIN (0000):")===CONFIG.SWITCH_PIN){currentUser=currentUser==='Chồng'?'Vợ':'Chồng'; localStorage.setItem('jika_user',currentUser); location.reload();} }
        
        window.onload = init;
    </script>
</body>
</html>
