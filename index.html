<!DOCTYPE html>
<html lang="vi-VN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jika Family — Digital Brain</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== LIQUID GLASS LIGHT — iOS 26 ===== */
:root {
  --accent: #007aff;
  --accent-glow: rgba(0,122,255,0.25);
  --red: #ff3b30;
  --green: #34c759;
  --amber: #ff9500;
  --grey: #8e8e93;

  /* Light glass tokens */
  --glass-bg: rgba(255,255,255,0.55);
  --glass-bg-strong: rgba(255,255,255,0.72);
  --glass-bg-light: rgba(255,255,255,0.40);
  --glass-border: rgba(0,0,0,0.07);
  --glass-border-bright: rgba(255,255,255,0.90);
  --glass-shine: rgba(255,255,255,0.60);

  --text-primary: rgba(0,0,0,0.88);
  --text-secondary: rgba(0,0,0,0.45);
  --text-tertiary: rgba(0,0,0,0.25);

  --blur-main: blur(32px) saturate(200%);
  --blur-heavy: blur(52px) saturate(220%);
  --blur-overlay: blur(60px) saturate(200%);

  --radius-sm: 14px;
  --radius-md: 20px;
  --radius-lg: 26px;
  --radius-xl: 34px;
  --radius-full: 999px;

  --shadow-card: 0 2px 20px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06);
  --shadow-float: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.06);
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: -apple-system, "SF Pro Text", "SF Pro Display", BlinkMacSystemFont, sans-serif;
  background: #e8edf5;
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ===== MESH BACKGROUND — LIGHT ===== */
.mesh-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 5%,  rgba(180,210,255,0.60) 0%, transparent 55%),
    radial-gradient(ellipse 55% 45% at 85% 15%,  rgba(200,180,255,0.45) 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 55% 90%,  rgba(160,220,255,0.40) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 5%  75%,  rgba(180,200,240,0.35) 0%, transparent 50%),
    radial-gradient(ellipse 50% 60% at 90% 70%,  rgba(210,190,255,0.30) 0%, transparent 55%),
    linear-gradient(155deg, #dce8f8 0%, #e4dff8 40%, #d8eaf8 100%);
  animation: meshShift 25s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0%   { filter: hue-rotate(0deg)   brightness(1);    }
  50%  { filter: hue-rotate(12deg)  brightness(1.03); }
  100% { filter: hue-rotate(-8deg)  brightness(0.98); }
}

/* ===== APP SHELL ===== */
.app-container { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; }

/* ===== HEADER ===== */
header {
  flex-shrink: 0;
  padding: env(safe-area-inset-top, 48px) 20px 14px;
  background: var(--glass-bg-strong);
  -webkit-backdrop-filter: var(--blur-heavy);
  backdrop-filter: var(--blur-heavy);
  border-bottom: 0.5px solid var(--glass-border);
  box-shadow: 0 1px 0 rgba(255,255,255,0.8), var(--shadow-card);
  display: flex; justify-content: space-between; align-items: flex-end;
  z-index: 50;
}
.header-title { font-size: 30px; font-weight: 700; letter-spacing: -0.8px; line-height: 1; color: var(--text-primary); }
.header-sub { font-size: 11px; color: var(--green); font-weight: 600; letter-spacing: 0.3px; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

.header-actions { display: flex; gap: 8px; align-items: center; }

.user-pill {
  display: flex; align-items: center; gap: 9px;
  background: var(--glass-bg);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-full);
  padding: 5px 14px 5px 6px;
  cursor: pointer;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-card);
  transition: background 0.2s, transform 0.1s;
}
.user-pill:active { transform: scale(0.97); }
.avatar-ring {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.9);
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #5b9cf6, #8b5cf6);
  box-shadow: 0 2px 8px rgba(91,156,246,0.4);
  flex-shrink: 0;
}
.avatar-ring img { width: 100%; height: 100%; object-fit: cover; display: none; }
.avatar-ring img.loaded { display: block; }
.avatar-ring .initials { font-size: 13px; font-weight: 700; color: white; }
.user-name-label { font-size: 13px; font-weight: 600; color: var(--text-primary); }

/* sync button */
.sync-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--glass-bg);
  border: 0.5px solid var(--glass-border);
  box-shadow: var(--shadow-card);
  color: var(--accent); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: transform 0.2s;
}
.sync-btn.spinning { animation: spin 0.7s linear; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* ===== MAIN SCROLL ===== */
main {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 14px 14px 120px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
main::-webkit-scrollbar { display: none; }

/* ===== SECTION LABEL ROW (label + lịch sử ngang hàng) ===== */
.section-label-row {
  display: flex; align-items: center; justify-content: space-between;
  margin: 22px 0 9px 4px;
}
.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--text-secondary);
  display: flex; align-items: center; gap: 8px;
  margin: 0;
}
.zone-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.inline-history-btn {
  font-size: 11px; font-weight: 600;
  color: var(--accent);
  background: rgba(0,122,255,0.08);
  border: 0.5px solid rgba(0,122,255,0.2);
  border-radius: var(--radius-full);
  padding: 3px 10px;
  cursor: pointer; font-family: inherit;
}

/* ===== LIQUID GLASS CARD ===== */
.glass-card {
  background: var(--glass-bg);
  -webkit-backdrop-filter: var(--blur-main);
  backdrop-filter: var(--blur-main);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  position: relative; overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
}
.glass-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(145deg, rgba(255,255,255,0.5) 0%, transparent 55%);
  pointer-events: none; border-radius: inherit;
  z-index: 0;
}
.glass-card > * { position: relative; z-index: 1; }
.glass-card:active { transform: scale(0.985); box-shadow: var(--shadow-card); }

/* ===== TASK CARD ===== */
.task-card {
  padding: 15px 16px 15px 22px;
  margin-bottom: 9px;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
}
.task-zone-bar {
  width: 4px; height: calc(100% - 16px); border-radius: 2px;
  position: absolute; left: 8px; top: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  overflow: visible;
}
/* Chấm nổi bật giữa thanh zone bar */
.task-zone-bar::after {
  content: '';
  width: 8px; height: 8px; border-radius: 50%;
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 6px currentColor;
  background: currentColor;
}
.zone-red   .task-zone-bar { background: var(--red);   color: var(--red); }
.zone-green .task-zone-bar { background: var(--green); color: var(--green); }
.zone-grey  .task-zone-bar { background: var(--grey);  color: var(--grey); }

.task-card-inner { flex: 1; min-width: 0; }
.task-title { font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-meta-row { display: flex; align-items: center; gap: 7px; margin-top: 5px; flex-wrap: wrap; }

/* Assignee pill với icon giới tính rõ ràng */
.task-assignee-pill {
  font-size: 10px; font-weight: 700;
  background: rgba(0,0,0,0.05);
  border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: var(--radius-full);
  padding: 2px 9px;
  color: var(--text-secondary);
  display: flex; align-items: center; gap: 4px;
}
.task-assignee-pill .assignee-icon { font-size: 12px; }

.task-deadline-text { font-size: 10px; color: var(--text-tertiary); }
.task-deadline-text.overdue { color: var(--red); font-weight: 700; }
.task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

/* Chat badge — chỉ hiện số tin nhắn */
.chat-badge {
  font-size: 10px; font-weight: 700;
  background: rgba(0,0,0,0.05);
  border: 0.5px solid rgba(0,0,0,0.08);
  border-radius: var(--radius-full);
  padding: 3px 10px;
  color: var(--text-secondary);
  display: flex; align-items: center; gap: 4px;
  min-width: 36px; justify-content: center;
}
.chat-badge.has-msg {
  background: rgba(0,122,255,0.10);
  border-color: rgba(0,122,255,0.20);
  color: var(--accent);
  font-weight: 800;
}

/* Overdue card */
.task-card.overdue-card {
  border-color: rgba(255,59,48,0.35);
  background: rgba(255,59,48,0.05);
}

/* Empty state */
.empty-state { padding: 14px 18px; font-size: 12px; color: var(--text-tertiary); text-align: center; }

/* ===== TAB BAR ===== */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(70px + env(safe-area-inset-bottom, 16px));
  background: var(--glass-bg-strong);
  -webkit-backdrop-filter: var(--blur-heavy);
  backdrop-filter: var(--blur-heavy);
  border-top: 0.5px solid var(--glass-border);
  box-shadow: 0 -1px 0 rgba(255,255,255,0.9);
  display: flex; justify-content: space-around; align-items: flex-start;
  padding-top: 10px; z-index: 50;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; color: var(--text-tertiary);
  font-size: 10px; font-weight: 500;
  padding: 0 4px; transition: color 0.2s; user-select: none;
}
.tab-item.active { color: var(--accent); }
.tab-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: background 0.2s, transform 0.15s;
}
.tab-item.active .tab-icon { background: rgba(0,122,255,0.10); transform: scale(1.08); }

/* ===== FAB ===== */
.fab {
  position: fixed;
  bottom: calc(78px + env(safe-area-inset-bottom, 16px));
  right: 18px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--accent); border: none; color: white;
  font-size: 28px; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.15);
  z-index: 40; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:active { transform: scale(0.92); }

/* ===== MODAL / SHEET ===== */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.30);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  display: none; align-items: flex-end;
}
.modal-overlay.open { display: flex; }

@keyframes sheetUp { from { transform: translateY(100%); opacity:0.7; } to { transform: translateY(0); opacity:1; } }

.sheet-handle-bar { display: flex; justify-content: center; padding: 12px 0 4px; flex-shrink: 0; }
.sheet-handle { width: 36px; height: 5px; border-radius: 3px; background: rgba(0,0,0,0.15); }

.sheet-header {
  padding: 0 20px 14px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 0.5px solid rgba(0,0,0,0.07); flex-shrink: 0;
}
.sheet-title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.sheet-close {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(0,0,0,0.06); border: 0.5px solid rgba(0,0,0,0.08);
  color: var(--text-secondary); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}

.sheet-scroll { flex: 1; overflow-y: auto; padding: 20px; }
.sheet-scroll::-webkit-scrollbar { display: none; }

/* ===== FORM ELEMENTS ===== */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--text-secondary); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 8px;
}
.form-input {
  width: 100%; padding: 14px 16px;
  background: rgba(255,255,255,0.7);
  border: 0.5px solid rgba(0,0,0,0.10);
  border-radius: var(--radius-md);
  color: var(--text-primary); font-size: 15px; font-family: inherit;
  outline: none; transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.form-input:focus { border-color: rgba(0,122,255,0.5); background: rgba(255,255,255,0.88); }
.form-input::placeholder { color: var(--text-tertiary); }
input[type="datetime-local"].form-input { font-size: 14px; color-scheme: light; }

/* Segmented */
.seg-control {
  display: flex; background: rgba(0,0,0,0.06);
  border: 0.5px solid rgba(0,0,0,0.07);
  border-radius: var(--radius-md); padding: 3px; gap: 2px;
}
.seg-btn {
  flex: 1; border: none; background: transparent;
  color: var(--text-secondary); font-size: 12px; font-weight: 600;
  padding: 9px 6px; border-radius: calc(var(--radius-md) - 4px);
  cursor: pointer; transition: background 0.18s, color 0.18s;
  font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.seg-btn .seg-sub { font-size: 8.5px; font-weight: 400; opacity: 0; transition: opacity 0.18s; }
.seg-btn.active .seg-sub { opacity: 0.75; }
.zone-seg .seg-btn[data-val="red"].active   { background: var(--red); color: white; }
.zone-seg .seg-btn[data-val="green"].active { background: var(--green); color: white; }
.zone-seg .seg-btn[data-val="grey"].active  { background: var(--grey); color: white; }
.assign-seg .seg-btn.active { background: white; color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.10); }

/* Picker */
.picker-row { display: flex; gap: 8px; }
.picker-cell {
  flex: 1; background: rgba(255,255,255,0.7); border: 0.5px solid rgba(0,0,0,0.09);
  border-radius: var(--radius-md); padding: 8px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.picker-select {
  background: none; border: none; color: var(--accent);
  font-size: 17px; font-weight: 700; font-family: inherit;
  text-align: center; width: 100%; outline: none;
  -webkit-appearance: none; padding: 2px 0;
}
.picker-lbl { font-size: 9px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }

/* Buttons */
.btn-primary {
  width: 100%; padding: 16px; background: var(--accent); color: white;
  border: none; border-radius: var(--radius-md);
  font-size: 16px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s; margin-top: 4px;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:active { opacity: 0.85; transform: scale(0.99); }
.btn-secondary {
  padding: 10px 18px;
  background: rgba(0,0,0,0.05); color: var(--text-secondary);
  border: 0.5px solid rgba(0,0,0,0.08); border-radius: var(--radius-full);
  font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
}
.btn-secondary:active { background: rgba(0,0,0,0.10); }
.btn-danger {
  padding: 10px 18px;
  background: rgba(255,59,48,0.08); color: var(--red);
  border: 0.5px solid rgba(255,59,48,0.2); border-radius: var(--radius-full);
  font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
}

/* ===== CHAT SHEET ===== */
.chat-header-info { flex: 1; min-width: 0; }
.chat-task-title { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.chat-task-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

.chat-zone-badge {
  flex-shrink: 0; padding: 6px 14px;
  border-radius: var(--radius-full); border: none;
  font-size: 12px; font-weight: 700; cursor: pointer;
}
.zone-badge-red   { background: rgba(255,59,48,0.10); color: var(--red); border: 0.5px solid rgba(255,59,48,0.2); }
.zone-badge-green { background: rgba(52,199,89,0.10); color: var(--green); border: 0.5px solid rgba(52,199,89,0.2); }
.zone-badge-grey  { background: rgba(142,142,147,0.12); color: var(--grey); border: 0.5px solid rgba(142,142,147,0.2); }

.chat-body { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.chat-body::-webkit-scrollbar { display: none; }

/* chat message row */
.msg-row { display: flex; flex-direction: column; }
.msg-row.sent  { align-items: flex-end; }
.msg-row.recv  { align-items: flex-start; }

.msg-name { font-size: 10px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 3px; padding: 0 4px; }

.msg-bubble {
  max-width: 80%; padding: 10px 14px;
  border-radius: 20px; font-size: 14px; line-height: 1.45;
  animation: bubblePop 0.18s ease;
}
@keyframes bubblePop { from {opacity:0;transform:scale(0.93) translateY(4px)} to {opacity:1;transform:scale(1) translateY(0)} }
.msg-bubble.sent {
  background: var(--accent); color: white;
  border-bottom-right-radius: 5px;
  box-shadow: 0 2px 10px rgba(0,122,255,0.25);
}
.msg-bubble.recv {
  background: rgba(255,255,255,0.82);
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  color: var(--text-primary);
  border-bottom-left-radius: 5px;
  border: 0.5px solid rgba(0,0,0,0.07);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

/* timestamp + read receipt row */
.msg-meta {
  display: flex; align-items: center; gap: 5px;
  margin-top: 3px; padding: 0 4px;
  font-size: 10px; color: var(--text-tertiary);
}
.msg-meta.sent  { justify-content: flex-end; }
.msg-meta.recv  { justify-content: flex-start; }
.read-tick { font-size: 11px; }
.read-tick.read  { color: var(--accent); }
.read-tick.unread { color: var(--text-tertiary); opacity: 0.6; }

/* limit banners */
.chat-limit-banner {
  margin: 6px 14px; padding: 10px 14px;
  background: rgba(255,59,48,0.07); border: 0.5px solid rgba(255,59,48,0.2);
  border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; color: var(--red);
  text-align: center; display: none;
}
.chat-limit-warn {
  margin: 6px 14px; padding: 10px 14px;
  background: rgba(255,149,0,0.07); border: 0.5px solid rgba(255,149,0,0.2);
  border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; color: var(--amber);
  text-align: center; display: none;
}

.chat-input-row {
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
  display: flex; align-items: center; gap: 8px;
  border-top: 0.5px solid rgba(0,0,0,0.07);
  background: rgba(242,242,247,0.95);
  -webkit-backdrop-filter: var(--blur-main); backdrop-filter: var(--blur-main);
  flex-shrink: 0;
}
.chat-text-input {
  flex: 1; padding: 11px 16px;
  background: rgba(255,255,255,0.8); border: 0.5px solid rgba(0,0,0,0.10);
  border-radius: var(--radius-full);
  color: var(--text-primary); font-size: 15px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.chat-text-input:focus { border-color: rgba(0,122,255,0.4); }
.chat-text-input::placeholder { color: var(--text-tertiary); }
.chat-send-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--accent); border: none; color: white; font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 3px 10px var(--accent-glow);
}
.chat-send-btn:active { opacity: 0.8; transform: scale(0.92); }
.chat-send-btn:disabled { background: var(--grey); opacity: 0.4; cursor: default; box-shadow: none; }

.chat-action-row { padding: 10px 16px 2px; display: flex; gap: 8px; flex-shrink: 0; }

/* ===== ARCHIVE SHEET ===== */

.finance-summary { padding: 20px; text-align: center; }

.finance-balance.positive { color: var(--green); }

.type-btn { flex: 1; padding: 13px; border: none; border-radius: var(--radius-md); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
.type-btn.income-btn { background: rgba(52,199,89,0.12); color: var(--green); border: 0.5px solid rgba(52,199,89,0.2); }
.type-btn.expense-btn { background: rgba(255,59,48,0.10); color: var(--red); border: 0.5px solid rgba(255,59,48,0.2); }

/* ===== VAULT ===== */
.pin-display { display: flex; justify-content: center; gap: 12px; margin: 24px 0 28px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(0,0,0,0.12); transition: background 0.15s, transform 0.15s; }
.pin-dot.filled { background: var(--accent); transform: scale(1.15); box-shadow: 0 0 8px var(--accent-glow); }
.pin-keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; max-width: 260px; margin: 0 auto; }
.pin-key {
  aspect-ratio: 1; border-radius: 50%;
  background: rgba(255,255,255,0.70); border: 0.5px solid rgba(0,0,0,0.08);
  color: var(--text-primary); font-size: 24px; font-weight: 400;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.1s, transform 0.1s; font-family: inherit;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.pin-key:active { background: rgba(0,122,255,0.12); transform: scale(0.92); }
.vault-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 17px; border-bottom: 0.5px solid var(--glass-border); }
.vault-item:last-child { border-bottom: none; }
.vault-item-label { font-size: 10px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
.vault-item-val { font-size: 15px; font-weight: 600; color: var(--accent); margin-top: 2px; }

/* ===== SHEET trong suốt iOS 26 ===== */
.sheet {
  width: 100%; max-height: 96dvh;
  background: rgba(235,240,250,0.88);
  -webkit-backdrop-filter: var(--blur-heavy);

/* ===== TASK COUNT BADGE ===== */
.tab-badge {

<!-- SHEET: ADD TASK -->

<!-- SHEET: TASK DETAIL / CHAT -->
<div class="modal-overlay" id="task-detail-modal" onclick="closeSheet('task-detail-modal')">
  <div class="sheet" style="max-height:98dvh;height:92dvh" onclick="event.stopPropagation()">

<script>
const CONFIG = {
  SB_URL: "https://zxvlthyrahpfzmrnfbib.supabase.co",
  SB_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dmx0aHlyaGFwZnptcm5mYmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjM2MjYsImV4cCI6MjA5NTc5OTYyNn0.sjJcMt4RkP5nWF2wldAFV1bIp7i56B0EPXlMtEHMkss",
  TG_TOKEN: "8188166581:AAFCm486x9i1v_t7rNOf9P9uHq68S4yG6tU",
  TG_CHAT_ID: "-1002587798916",
  VAULT_PIN: "0561000963557",
  SWITCH_PIN: "0000",
  AVATARS: { "Chồng": "", "Vợ": "" },
  // Mood check-in: chỉ hiện sau lần đầu MỞ APP nếu đã qua 3 giờ kể từ lần check-in cuối
  MOOD_INTERVAL_MS: 3 * 60 * 60 * 1000
};

const _sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
let currentUser = localStorage.getItem('jika_user') || 'Chồng';
let tasks = [], finances = [], events = [], vault = [], moods = [];
let currentDetailId = null, currentTab = 'tasks', enteredPin = "";

/* ===== INIT ===== */
async function init() {
  setUserUI();
  fillPickers();
  setupSegmentedControls();
  await loadAll();
  // Mood: chỉ hỏi 1 lần khi mở app, không hỏi lại mỗi 30 phút bằng interval
  checkMoodCheckin();
  setupRealtime();
  setInterval(checkAlerts, 60000);
}

function setUserUI() {
  document.getElementById('display-name').innerText = currentUser;
  document.getElementById('mood-greeting').innerText = `Chào ${currentUser} ❤️`;
  document.getElementById('user-initials').innerText = currentUser === 'Chồng' ? 'C' : 'V';
  document.querySelectorAll('#assignee-selector .seg-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === currentUser);
  });
  const img = document.getElementById('user-avatar');
  const url = CONFIG.AVATARS[currentUser];
  if (url) {
    img.onload = () => { img.classList.add('loaded'); document.getElementById('user-initials').style.display = 'none'; };
    img.src = url;
  }
}

function fillPickers() {
  const d = document.getElementById('alert-d');
  const h = document.getElementById('alert-h');
  const m = document.getElementById('alert-m');
  for (let i = 0; i <= 30; i++) d.innerHTML += `<option value="${i}">${i}</option>`;
  for (let i = 0; i <= 23; i++) h.innerHTML += `<option value="${i}">${i}</option>`;
  for (let i = 0; i <= 59; i += 5) m.innerHTML += `<option value="${i}">${i}</option>`;
}

function setupSegmentedControls() {
  document.querySelectorAll('.seg-control').forEach(ctrl => {
    ctrl.querySelectorAll('.seg-btn').forEach(btn => {
      btn.onclick = function() {
        ctrl.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
      };
    });
  });
}

/* ===== TOAST DEBUG ===== */
function toast(msg, color) {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:${color||'rgba(0,0,0,0.75)'};color:white;padding:10px 18px;
    border-radius:20px;font-size:13px;font-weight:600;z-index:9999;
    max-width:85%;text-align:center;word-break:break-all;`;
  el.innerText = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

/* ===== LOAD DATA ===== */
async function loadAll() {
  try {
    const { data, error } = await _sb.from('jika_data').select('*');
    if (error) {
      toast('❌ Load lỗi: ' + error.message, 'rgba(255,59,48,0.9)');
      console.error('loadAll error:', error);
    }
    if (data && data.length > 0) {
      data.forEach(row => {
        try {
          let val = row.value;
          // Supabase JSONB trả về object JS, text trả về string — xử lý cả hai
          if (typeof val === 'string') val = JSON.parse(val);
          if (row.key === 'jika_tasks'    && Array.isArray(val)) tasks    = val;
          if (row.key === 'jika_finances' && Array.isArray(val)) finances = val;
          if (row.key === 'jika_events'   && Array.isArray(val)) events   = val;
          if (row.key === 'jika_vault'    && Array.isArray(val)) vault    = val;
          if (row.key === 'jika_moods'    && Array.isArray(val)) moods    = val;
        } catch(e) { console.warn('Parse error key=' + row.key, e); }
      });
    } else if (data && data.length === 0) {
      console.log('Supabase trả về mảng rỗng — bảng chưa có dữ liệu');
    }
  } catch(e) {
    toast('❌ Mạng lỗi: ' + e.message, 'rgba(255,59,48,0.9)');
    console.error('loadAll network error:', e);
  }
  renderCurrentTab();
  updateTaskBadge();
}

/* ===== SAVE TO SUPABASE (helper dùng chung) ===== */
async function saveTasks() {
  const payload = JSON.stringify(tasks);
  const { error } = await _sb
    .from('jika_data')
    .upsert({ key: 'jika_tasks', value: payload }, { onConflict: 'key' });
  if (error) {
    toast('❌ Lưu thất bại: ' + error.message, 'rgba(255,59,48,0.9)');
    console.error('saveTasks error:', error);
    return false;
  }
  return true;
}

/* ===== MANUAL SYNC (nút đồng bộ thủ công) ===== */
async function manualSync() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('spinning');
  await loadAll();
  // Nếu đang xem chat, refresh luôn
  if (currentDetailId) renderChat(currentDetailId);
  setTimeout(() => btn.classList.remove('spinning'), 700);
}

/* ===== REALTIME ===== */
function setupRealtime() {
  _sb.channel('jika_realtime_v3')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'jika_data' }, payload => {
      if (!payload.new || !payload.new.key) return;
      try {
        const k = payload.new.key;
        const v = typeof payload.new.value === 'string' ? JSON.parse(payload.new.value) : payload.new.value;
        if (k === 'jika_tasks') {
          tasks = Array.isArray(v) ? v : tasks;
          if (currentTab === 'tasks') renderTasks();
          if (currentDetailId) renderChat(currentDetailId);
          updateTaskBadge();
        }
        if (k === 'jika_finances') { finances = Array.isArray(v) ? v : finances; if (currentTab === 'finance') renderFinance(); }
        if (k === 'jika_vault')    { vault    = Array.isArray(v) ? v : vault; }
      } catch(e) {}
    }).subscribe();
}

/* ===== NAVIGATION ===== */
function nav(page, el) {
  currentTab = page;
  document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-title').innerText = el.querySelector('span').innerText;
  renderCurrentTab();
}

function renderCurrentTab() {
  document.getElementById('fab-btn').style.display =
    (currentTab === 'tasks' || currentTab === 'events' ||
     (currentTab === 'vault' && enteredPin === CONFIG.VAULT_PIN)) ? 'flex' : 'none';
  if (currentTab === 'tasks')   renderTasks();
  if (currentTab === 'events')  renderEvents();
  if (currentTab === 'finance') renderFinance();
  if (currentTab === 'vault')   enteredPin === CONFIG.VAULT_PIN ? renderVaultOpen() : renderVaultLock();
}

function onFabClick() {
  if (currentTab === 'tasks') openSheet('add-task-modal');
  else if (currentTab === 'vault') alert('Thêm mục (đang phát triển)');
}

/* ===== RENDER TASKS ===== */
function renderTasks() {
  const m = document.getElementById('main-content');
  const now = Date.now();
  const activeTasks = tasks.filter(t => !t.completed);
  const zones = [
    { id: 'red',   label: 'Làm Ngay', color: 'var(--red)' },
    { id: 'green', label: 'Lên Lịch', color: 'var(--green)' },
    { id: 'grey',  label: 'Để Sau',   color: 'var(--grey)' }
  ];
  let html = '';
  zones.forEach((z, zIdx) => {
    const zt = activeTasks.filter(t => t.zone === z.id);
    const historyBtn = (zIdx === 0)
      ? `<button class="inline-history-btn" onclick="openArchive()">🕒 Lịch sử</button>`
      : '';
    html += `
      <div class="section-label-row">
        <div class="section-label"><div class="zone-dot" style="background:${z.color}"></div>${z.label} <span style="color:var(--text-tertiary);font-weight:400">(${zt.length})</span></div>
        ${historyBtn}
      </div>`;
    if (!zt.length) {
      html += `<div class="empty-state">Không có việc nào — tốt lắm! 🎉</div>`;
    } else {
      zt.forEach(t => {
        const isOverdue = t.deadline && new Date(t.deadline).getTime() < now;
        const deadlineText = t.deadline ? formatDeadline(t.deadline, isOverdue) : 'Không hạn';
        const chatCount = (t.chat || []).length;
        const assigneeIcon = (t.assignee === 'Chồng') ? '👨' : (t.assignee === 'Vợ') ? '👩' : '👤';
        const badgeClass = chatCount > 0 ? 'has-msg' : '';

        html += `
          <div class="glass-card task-card zone-${z.id} ${isOverdue ? 'overdue-card' : ''}" onclick="openDetail('${t.id}')">
            <div class="task-zone-bar"></div>
            <div class="task-card-inner">
              <div class="task-title">${escHtml(t.title)}</div>
              <div class="task-meta-row">
                <span class="task-assignee-pill"><span class="assignee-icon">${assigneeIcon}</span>${t.assignee || '—'}</span>
                <span class="task-deadline-text ${isOverdue ? 'overdue' : ''}">⏱ ${deadlineText}</span>
              </div>
            </div>
            <div class="task-right">
              <div class="chat-badge ${badgeClass}">💬 ${chatCount}</div>
            </div>
          </div>`;
      });
    }
  });
  m.innerHTML = html;
}

function formatDeadline(dl, overdue) {
  const d = new Date(dl), now = new Date();
  const diffMs = d - now;
  const diffH = Math.round(diffMs / 3600000);
  const diffD = Math.round(diffMs / 86400000);
  if (overdue) return `Quá hạn ${Math.abs(diffD)}n`;
  if (diffH < 2) return `Còn ~${Math.max(0,diffH)}h`;
  if (diffD < 1) return `Còn ${diffH}h`;
  if (diffD < 7) return `Còn ${diffD} ngày`;
  return `${d.getDate()}/${d.getMonth()+1}`;
}

function updateTaskBadge() {
  const urgent = tasks.filter(t => !t.completed && t.zone === 'red').length;
  const badge = document.getElementById('task-badge');
  if (urgent > 0) { badge.style.display = 'flex'; badge.innerText = urgent > 9 ? '9+' : urgent; }
  else badge.style.display = 'none';
}

/* ===== SAVE NEW TASK ===== */
async function saveNewTask() {
  const title = document.getElementById('task-title-input').value.trim();
  if (!title) { document.getElementById('task-title-input').focus(); return; }
  const assigneeActive = document.querySelector('#assignee-selector .active');
  const zoneActive = document.querySelector('#zone-selector .active');
  const newTask = {
    id: 't' + Date.now(), title,
    zone: zoneActive ? zoneActive.dataset.val : 'red',
    assignee: assigneeActive ? assigneeActive.dataset.val : currentUser,
    deadline: document.getElementById('task-deadline-input').value || null,
    alertBefore: {
      d: parseInt(document.getElementById('alert-d').value) || 0,
      h: parseInt(document.getElementById('alert-h').value) || 0,
      m: parseInt(document.getElementById('alert-m').value) || 0
    },
    completed: false, completedAt: null, chat: [], readBy: {}, lastAlert: 0
  };
  tasks.push(newTask);
  document.getElementById('task-title-input').value = '';
  document.getElementById('task-deadline-input').value = '';
  closeSheet('add-task-modal');
  renderTasks(); updateTaskBadge();
  const ok = await saveTasks();
  if (ok) {
    toast('✅ Đã lưu: ' + title, 'rgba(52,199,89,0.9)');
    sendTelegram(`📌 Task mới từ ${currentUser}\n"${title}"\n👤 ${newTask.assignee} | Zone: ${newTask.zone.toUpperCase()}${newTask.deadline ? '\n⏰ Hạn: ' + newTask.deadline.replace('T',' ') : ''}`);
  }
}

/* ===== TASK DETAIL ===== */
function openDetail(id) {
  currentDetailId = id;
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('dt-title').innerText = t.title;
  document.getElementById('dt-info').innerText = `👤 ${t.assignee} | ⏱ ${t.deadline ? t.deadline.replace('T', ' ') : 'Không hạn'}`;
  const doneBtn = document.getElementById('dt-done-btn');
  doneBtn.className = 'chat-zone-badge zone-badge-' + t.zone;
  doneBtn.innerText = 'Hoàn thành ✓';
  doneBtn.onclick = () => finishTask(id);
  // Đánh dấu đã đọc: ghi nhận user hiện tại đã xem task này
  markRead(id);
  openSheet('task-detail-modal');
  renderChat(id);
}

/* Đánh dấu user đã đọc chat mới nhất trong task */
async function markRead(id) {
  const t = tasks.find(x => x.id === id);
  if (!t || !(t.chat || []).length) return;
  if (!t.readBy) t.readBy = {};
  const lastIdx = t.chat.length - 1;
  if (t.readBy[currentUser] === lastIdx) return; // đã đọc rồi, không cần save
  t.readBy[currentUser] = lastIdx;
  await _sb.from('jika_data').upsert({ key: 'jika_tasks', value: JSON.stringify(tasks) });
}

/* ===== RENDER CHAT (có thời gian + dấu đã đọc) ===== */
function renderChat(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const box = document.getElementById('chat-box');
  const chat = t.chat || [];
  const readBy = t.readBy || {};
  const other = currentUser === 'Chồng' ? 'Vợ' : 'Chồng';

  box.innerHTML = '';
  chat.forEach((msg, idx) => {
    const isSent = msg.user === currentUser;
    const timeStr = msg.time ? fmtTime(msg.time) : '';
    // Dấu đọc: chỉ hiện ở tin nhắn cuối cùng của mình, kiểm tra đối phương đã đọc chưa
    let readTick = '';
    if (isSent) {
      const otherRead = (readBy[other] !== undefined && readBy[other] >= idx);
      readTick = `<span class="read-tick ${otherRead ? 'read' : 'unread'}">${otherRead ? '✓✓' : '✓'}</span>`;
    }
    box.innerHTML += `
      <div class="msg-row ${isSent ? 'sent' : 'recv'}">
        <div class="msg-name">${msg.user}</div>
        <div class="msg-bubble ${isSent ? 'sent' : 'recv'}">${escHtml(msg.text)}</div>
        <div class="msg-meta ${isSent ? 'sent' : 'recv'}">
          <span>${timeStr}</span>
          ${readTick}
        </div>
      </div>`;
  });
  box.scrollTop = box.scrollHeight;

  const limitBanner = document.getElementById('chat-limit-banner');
  const limitWarn   = document.getElementById('chat-limit-warn');
  const sendBtn     = document.getElementById('chat-send-btn');
  const input       = document.getElementById('chat-msg-input');

  if (chat.length >= 10) {
    limitBanner.style.display = 'block'; limitWarn.style.display = 'none';
    sendBtn.disabled = true; input.disabled = true; input.placeholder = 'Đã khoá — gọi điện 📞';
  } else if (chat.length === 9) {
    limitWarn.style.display = 'block'; limitBanner.style.display = 'none';
    sendBtn.disabled = false; input.disabled = false; input.placeholder = 'Tin nhắn cuối…';
  } else {
    limitBanner.style.display = 'none'; limitWarn.style.display = 'none';
    sendBtn.disabled = false; input.disabled = false; input.placeholder = 'Thảo luận…';
  }
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  if (sameDay) return `${h}:${m}`;
  return `${d.getDate()}/${d.getMonth()+1} ${h}:${m}`;
}

async function sendChat() {
  const input = document.getElementById('chat-msg-input');
  const text = input.value.trim();
  if (!text || !currentDetailId) return;
  const t = tasks.find(x => x.id === currentDetailId);
  if (!t || (t.chat || []).length >= 10) return;
  if (!t.chat) t.chat = [];
  if (!t.readBy) t.readBy = {};
  t.chat.push({ user: currentUser, text, time: new Date().toISOString() });
  t.readBy[currentUser] = t.chat.length - 1;
  input.value = '';
  renderChat(currentDetailId);
  const ok = await saveTasks();
  if (ok) sendTelegram(`💬 ${currentUser} → [${t.title}]\n"${text}"`);
}

async function finishTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.completed = true; t.completedAt = new Date().toISOString();
  closeSheet('task-detail-modal');
  renderTasks(); updateTaskBadge();
  await saveTasks();
}

/* ===== ARCHIVE ===== */
function openArchive() {
  const list = document.getElementById('archive-list');
  const done = tasks.filter(t => t.completed);
  if (!done.length) {
    list.innerHTML = `<div class="empty-state" style="padding:40px 20px">Chưa có việc nào hoàn thành</div>`;
  } else {
    list.innerHTML = done.map(t => `
      <div class="glass-card archive-task-row" style="margin-bottom:9px">
        <div>
          <div class="archive-title">${escHtml(t.title)}</div>
          <div class="archive-meta">👤 ${t.assignee} | ✓ ${t.completedAt ? new Date(t.completedAt).toLocaleDateString('vi-VN') : 'Đã xong'}</div>
        </div>
        <button class="btn-secondary" onclick="restoreTask('${t.id}')">↩ Khôi phục</button>
      </div>`).join('');
  }
  openSheet('archive-modal');
}

async function restoreTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.completed = false; t.completedAt = null;
  await saveTasks();
  closeSheet('archive-modal');
  renderTasks(); updateTaskBadge(); openArchive();
}

/* ===== EVENTS ===== */
function renderEvents() {
  const m = document.getElementById('main-content');
  const fixed = [
    { n: "Sinh nhật Vợ ❤️", d: "12-27" },
    { n: "Sinh nhật Simba 🦁", d: "11-25" },
    { n: "Sinh nhật Lisa 🌸", d: "08-28" }
  ];
  const now = new Date();
  const rows = [...fixed, ...events].map(e => {
    const raw = e.d || e.date;
    let t;
    if (raw.length === 5) {
      const [mo, dy] = raw.split('-');
      t = new Date(now.getFullYear(), parseInt(mo)-1, parseInt(dy));
      if (t < now) t.setFullYear(now.getFullYear() + 1);
    } else { t = new Date(raw); }
    const days = Math.ceil((t - now) / 86400000);
    let cls = '', label = `Còn ${days} ngày`;
    if (days === 0) { cls = 'today'; label = 'Hôm nay! 🎉'; }
    else if (days <= 7) { cls = 'soon'; label = `Còn ${days} ngày ⚡`; }
    return `<div class="event-row"><div class="event-name">${e.n || e.name}</div><div class="event-countdown ${cls}">${label}</div></div>`;
  }).join('');
  m.innerHTML = `
    <div class="section-label"><div class="zone-dot" style="background:var(--accent)"></div>Đếm ngược</div>
    <div class="glass-card" style="overflow:hidden">${rows}</div>
    <div style="margin-top:16px"><button class="btn-primary" onclick="alert('Sắp có — đang phát triển 🚧')">+ Thêm sự kiện</button></div>`;
}

/* ===== FINANCE ===== */
function renderFinance() {
  const m = document.getElementById('main-content');
  let tin = 0, tout = 0;
  finances.forEach(f => { const a = parseInt(f.amount)||0; if(f.type==='in') tin+=a; else tout+=a; });
  const bal = tin - tout;
  const recent = [...finances].reverse().slice(0, 10);
  const rows = recent.map(f => {
    const isIn = f.type === 'in';
    return `<div class="finance-row">
      <div><div class="finance-label">${escHtml(f.name)}</div><div style="font-size:10px;color:var(--text-tertiary)">${f.date?new Date(f.date).toLocaleDateString('vi-VN'):''}</div></div>
      <div class="finance-val ${isIn?'income':'expense'}">${isIn?'+':'−'}${parseInt(f.amount).toLocaleString('vi-VN')}đ</div>
    </div>`;
  }).join('');
  m.innerHTML = `
    <div class="glass-card" style="margin-bottom:14px">
      <div class="finance-summary">
        <div style="font-size:11px;color:var(--text-secondary);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px">Số dư hiện tại</div>
        <div class="finance-balance ${bal>=0?'positive':'negative'}">${bal.toLocaleString('vi-VN')}đ</div>
        <div style="display:flex;justify-content:center;gap:24px;margin-top:14px">
          <div style="text-align:center"><div style="font-size:10px;color:var(--text-tertiary);font-weight:700;text-transform:uppercase">Thu</div><div style="font-size:15px;font-weight:700;color:var(--green)">${tin.toLocaleString('vi-VN')}đ</div></div>
          <div style="width:0.5px;background:var(--glass-border)"></div>
          <div style="text-align:center"><div style="font-size:10px;color:var(--text-tertiary);font-weight:700;text-transform:uppercase">Chi</div><div style="font-size:15px;font-weight:700;color:var(--red)">${tout.toLocaleString('vi-VN')}đ</div></div>
        </div>
      </div>
    </div>
    <div class="glass-card" style="margin-bottom:14px;overflow:hidden">
      <div class="finance-row" style="background:rgba(255,59,48,0.04)">
        <div><div class="finance-label" style="font-weight:700">⚠️ Lãi Sacombank</div><div style="font-size:10px;color:var(--text-tertiary)">Ngày 25 hàng tháng</div></div>
        <div class="finance-val expense">28.000.000đ</div>
      </div>
    </div>
    <div class="section-label"><div class="zone-dot" style="background:var(--accent)"></div>Nhập giao dịch</div>
    <div class="glass-card" style="padding:16px;margin-bottom:14px">
      <input id="fn" class="form-input" placeholder="Nội dung giao dịch" style="margin-bottom:10px">
      <input id="fa" type="number" class="form-input" placeholder="Số tiền (VND)">
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="type-btn income-btn" onclick="addFin('in')">+ Thu nhập</button>
        <button class="type-btn expense-btn" onclick="addFin('out')">− Chi tiêu</button>
      </div>
    </div>
    ${recent.length?`<div class="section-label"><div class="zone-dot" style="background:var(--grey)"></div>Gần đây</div><div class="glass-card" style="overflow:hidden">${rows}</div>`:''}`;
}

async function addFin(type) {
  const n = document.getElementById('fn').value.trim();
  const a = document.getElementById('fa').value;
  if (!n || !a) return;
  finances.push({ name: n, amount: parseInt(a), type, date: new Date().toISOString() });
  await _sb.from('jika_data').upsert({ key: 'jika_finances', value: JSON.stringify(finances) });
  renderFinance();
}

/* ===== VAULT ===== */
function renderVaultLock() {
  enteredPin = '';
  const m = document.getElementById('main-content');
  const dotCount = Math.min(CONFIG.VAULT_PIN.length, 13);
  m.innerHTML = `
    <div style="text-align:center;padding-top:40px">
      <div style="font-size:54px;margin-bottom:12px">🗄️</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:4px;color:var(--text-primary)">Ngăn Kéo Bảo Mật</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:32px">Nhập mã PIN để mở tủ</div>
      <div class="pin-display">${'<div class="pin-dot"></div>'.repeat(dotCount)}</div>
      <div class="pin-keypad">
        ${[1,2,3,4,5,6,7,8,9,'C',0,'⌫'].map(k=>`<button class="pin-key" onclick="tapPin('${k}')">${k}</button>`).join('')}
      </div>
    </div>`;
}

function tapPin(v) {
  if (v === 'C') enteredPin = '';
  else if (v === '⌫') enteredPin = enteredPin.slice(0, -1);
  else enteredPin += v;
  document.querySelectorAll('.pin-dot').forEach((d, i) => d.classList.toggle('filled', i < enteredPin.length));
  if (enteredPin === CONFIG.VAULT_PIN) renderVaultOpen();
}

function renderVaultOpen() {
  const m = document.getElementById('main-content');
  const items = vault.map((v, idx) => `
    <div class="glass-card vault-item" style="margin-bottom:8px">
      <div><div class="vault-item-label">${escHtml(v.title)}</div><div class="vault-item-val">${escHtml(v.val)}</div></div>
      <button class="btn-danger" onclick="delVault(${idx})">Xoá</button>
    </div>`).join('');
  m.innerHTML = `
    <div class="section-label"><div class="zone-dot" style="background:var(--accent)"></div>Hồ sơ gia đình</div>
    ${items || '<div class="empty-state">Chưa có mục nào</div>'}
    <button class="btn-secondary" style="margin-top:12px" onclick="renderVaultLock()">🔒 Khoá tủ</button>`;
}

async function delVault(idx) {
  if (!confirm('Xoá mục này?')) return;
  vault.splice(idx, 1);
  await _sb.from('jika_data').upsert({ key: 'jika_vault', value: JSON.stringify(vault) });
  renderVaultOpen();
}

/* ===== MOOD — chỉ hiện 1 lần khi mở app, nếu đã > 3h kể từ lần cuối ===== */
function checkMoodCheckin() {
  const last = parseInt(localStorage.getItem('jika_mood_time') || '0');
  const now = Date.now();
  // Chỉ hỏi nếu đã qua đủ interval (3 giờ) — KHÔNG dùng setInterval để tránh popup liên tục
  if (now - last > CONFIG.MOOD_INTERVAL_MS) {
    // Delay 1.2s để app load xong rồi mới hiện overlay, tránh bật ngay khi mở
    setTimeout(() => {
      document.getElementById('mood-overlay').style.display = 'flex';
    }, 1200);
  }
}

async function saveMood(emoji) {
  moods.push({ u: currentUser, m: emoji, t: new Date().toISOString() });
  localStorage.setItem('jika_mood_time', Date.now().toString());
  document.getElementById('mood-overlay').style.display = 'none';
  await _sb.from('jika_data').upsert({ key: 'jika_moods', value: JSON.stringify(moods) });
}

/* ===== ALERTS ===== */
async function checkAlerts() {
  const now = Date.now(); let changed = false;
  tasks.forEach(t => {
    if (t.completed || !t.deadline || !t.alertBefore) return;
    const dl = new Date(t.deadline).getTime();
    const alertMs = ((t.alertBefore.d||0)*86400 + (t.alertBefore.h||0)*3600 + (t.alertBefore.m||0)*60)*1000;
    if (alertMs > 0 && now >= (dl - alertMs) && (now - (t.lastAlert||0) > 3600000)) {
      const diffH = Math.round((dl - now)/3600000);
      sendTelegram(`🚨 <b>NHẮC VIỆC CHƯA XONG</b>\n📌 ${t.title}\n👤 ${t.assignee}\n⏰ Còn khoảng ${diffH}h`);
      t.lastAlert = now; changed = true;
    }
  });
  if (changed) await _sb.from('jika_data').upsert({ key: 'jika_tasks', value: JSON.stringify(tasks) });
}

/* ===== TELEGRAM ===== */
function sendTelegram(text) {
  fetch(`https://api.telegram.org/bot${CONFIG.TG_TOKEN}/sendMessage?chat_id=${CONFIG.TG_CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=HTML`).catch(()=>{});
}

/* ===== USER SWITCH ===== */
function switchUserPrompt() {
  const pin = prompt('Nhập PIN để đổi user:');
  if (pin === CONFIG.SWITCH_PIN) {
    currentUser = currentUser === 'Chồng' ? 'Vợ' : 'Chồng';
    localStorage.setItem('jika_user', currentUser);
    location.reload();
  }
}

/* ===== SHEET HELPERS ===== */
function openSheet(id) { const el = document.getElementById(id); el.style.display='flex'; el.classList.add('open'); }
function closeSheet(id) { const el = document.getElementById(id); el.style.display='none'; el.classList.remove('open'); if(id==='task-detail-modal') currentDetailId=null; }

/* ===== UTILS ===== */
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.onload = init;
</script>
