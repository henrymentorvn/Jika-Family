<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jika Family — Digital Brain</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ios-red: #ff3b30; --ios-blue: #007aff; --ios-green: #34c759; --ios-grey: #8e8e93;
            --glass: rgba(255, 255, 255, 0.4); --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #1c1c1e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f5f7fa; color: var(--text-main); overflow: hidden; }
        .mesh-bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(45deg, #ee9ca7, #ffdde1, #2193b0, #6dd5ed); background-size: 400% 400%; animation: gradientBG 15s ease infinite; filter: blur(60px); }
        @keyframes gradientBG { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }
        .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        header { padding: 50px 20px 10px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        header h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .user-section { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.4); padding: 5px 12px; border-radius: 25px; border: 1px solid var(--glass-border); }
        .avatar-frame { width: 34px; height: 34px; border-radius: 50%; background: #fff; overflow: hidden; border: 1.5px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-size: 13px; font-weight: 700; color: #333; }
        .sync-btn { font-size: 18px; cursor: pointer; color: var(--ios-blue); }
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; scroll-behavior: smooth; }
        .section-label { font-size: 12px; font-weight: 800; color: #666; margin: 25px 0 10px 10px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .card { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 18px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .task-card { display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .task-card:active { transform: scale(0.98); opacity: 0.8; }
        .task-info h3 { margin: 0; font-size: 16px; font-weight: 700; }
        .task-info p { margin: 5px 0 0; font-size: 11px; color: #444; font-weight: 500; }
        .msg-count { font-size: 11px; font-weight: 700; background: rgba(0,0,0,0.08); padding: 3px 10px; border-radius: 12px; }
        .modal { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.3); display: none; justify-content: center; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; max-height: 94%; border-radius: 32px 32px 0 0; padding: 25px; display: flex; flex-direction: column; animation: slideUp 0.3s cubic-bezier(0, 0.5, 0.5, 1); overflow-y: auto; }
        @keyframes slideUp { from {transform: translateY(100%)} to {transform: translateY(0)} }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #777; margin-bottom: 8px; text-transform: uppercase; }
        .form-input { width: 100%; padding: 15px; border-radius: 16px; border: 1px solid #eee; background: #f5f5f7; font-size: 16px; outline: none; font-family: inherit; }
        .segmented-control { display: flex; background: #efeff4; border-radius: 16px; padding: 3px; gap: 3px; }
        .segmented-control button { flex: 1; border: none; padding: 12px; border-radius: 13px; font-size: 13px; font-weight: 700; cursor: pointer; color: #666; transition: 0.2s; }
        .zone-btn[data-val="red"].active { background: var(--ios-red); color: white; }
        .zone-btn[data-val="green"].active { background: var(--ios-green); color: white; }
        .zone-btn[data-val="grey"].active { background: var(--ios-grey); color: white; }
        .assign-btn.active { background: white; color: var(--ios-blue); box-shadow: 0 3px 8px rgba(0,0,0,0.1); }
        .btn-main { width: 100%; background: var(--ios-blue); color: white; border: none; padding: 18px; border-radius: 20px; font-size: 17px; font-weight: 700; cursor: pointer; }
        .btn-main:active { transform: scale(0.97); opacity: 0.9; }
        .fab { position: fixed; bottom: 100px; right: 20px; width: 64px; height: 64px; border-radius: 32px; background: var(--ios-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 10px 25px rgba(0,122,255,0.4); z-index: 90; border: none; cursor: pointer; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(25px); border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-around; padding-top: 12px; z-index: 100; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #8e8e93; font-size: 10px; font-weight: 600; cursor: pointer; flex: 1; }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 26px; margin-bottom: 5px; }
        #mood-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(255,255,255,0.1); backdrop-filter: blur(40px); display: none; flex-direction: column; justify-content: center; align-items: center; }
        .mood-card { background: white; padding: 40px 30px; border-radius: 45px; text-align: center; box-shadow: 0 25px 70px rgba(0,0,0,0.2); width: 88%; max-width: 340px; }
        .chat-box { flex: 1; overflow-y: auto; margin: 15px 0; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 14px; max-width: 85%; padding: 12px 16px; border-radius: 20px; line-height: 1.4; }
        .msg.sent { background: var(--ios-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: #e9e9eb; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* Keypad Styles - Smaller */
        .pin-dots { display: flex; justify-content: center; gap: 10px; margin: 20px 0 30px; flex-wrap: wrap; padding: 0 20px; }
        .pin-dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; transition: 0.2s; }
        .pin-dot.active { background: var(--ios-blue); transform: scale(1.2); }
        .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 280px; margin: 0 auto; }
        .pin-btn { background: white; border: none; width: 65px; height: 64px; border-radius: 50%; font-size: 24px; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .pin-btn:active { background: #e5e5ea; }

        .vault-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .vault-label { font-size: 12px; color: #666; font-weight: 700; text-transform: uppercase; }
        .vault-val { font-size: 16px; font-weight: 600; color: var(--ios-blue); margin-top: 4px; }
        .del-btn { color: var(--ios-red); font-size: 18px; cursor: pointer; padding: 10px; }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div id="mood-overlay"><div class="mood-card">
        <h2 id="mood-user-name">Chào ❤️</h2><p style="color: #666; font-size: 14px;">Cảm xúc của bạn lúc này?</p>
        <div style="display: flex; justify-content: space-around; margin-top: 30px;">
            <button onclick="saveMood('😊')" style="font-size: 50px; border:none; background:none;">😊</button>
            <button onclick="saveMood('😐')" style="font-size: 50px; border:none; background:none;">😐</button>
            <button onclick="saveMood('😠')" style="font-size: 50px; border:none; background:none;">😠</button>
        </div>
    </div></div>

    <div class="app-container">
        <header>
            <div><h1 id="page-title">Task</h1><div style="font-size: 10px; color: var(--ios-green); font-weight: 800;">● LIVE SYNC</div></div>
            <div class="user-section">
                <div class="sync-btn" onclick="location.reload()">↻</div>
                <span class="user-name" id="display-name" onclick="switchUserPrompt()">---</span>
                <div class="avatar-frame"><img id="user-avatar" src="" alt="Avatar"></div>
            </div>
        </header>
        <main id="main-content"></main>
        <button id="add-fab" class="fab" onclick="showAddModal()">+</button>
        <div class="tab-bar">
            <div class="tab-item active" onclick="nav('tasks', this)"><span class="tab-icon">📋</span>Task</div>
            <div class="tab-item" onclick="nav('events', this)"><span class="tab-icon">⏳</span>Sự kiện</div>
            <div class="tab-item" onclick="nav('finance', this)"><span class="tab-icon">💰</span>Tài chính</div>
            <div class="tab-item" onclick="nav('vault', this)"><span class="tab-icon">🗄️</span>Ngăn Kéo</div>
        </div>
    </div>

    <!-- MODAL ADD TASK -->
    <div id="add-task-modal" class="modal" onclick="closeModal('add-task-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin-top:0">Việc mới</h2>
            <div class="form-group"><label>Tiêu đề ★</label><input type="text" id="task-title-input" class="form-input" placeholder="Ví dụ: Đóng tiền nước"></div>
            <div class="form-group"><label>Ưu tiên</label><div class="segmented-control" id="zone-selector"><button class="zone-btn active" data-val="red">Làm Ngay</button><button class="zone-btn" data-val="green">Lên Lịch</button><button class="zone-btn" data-val="grey">Để Sau</button></div></div>
            <div style="display:flex; gap:12px"><div class="form-group" style="flex:1"><label>Đảm nhận</label><div class="segmented-control" id="assignee-selector"><button class="assign-btn" data-val="Chồng">Chồng</button><button class="assign-btn" data-val="Vợ">Vợ</button></div></div><div class="form-group" style="flex:1"><label>Hạn chót</label><input type="datetime-local" id="task-deadline-input" class="form-input"></div></div>
            <div class="form-group"><label>Cảnh báo Telegram trước</label><div style="display:flex; gap:5px"><input type="number" id="alert-d" class="form-input" placeholder="0 ngày"><input type="number" id="alert-h" class="form-input" placeholder="0 giờ"><input type="number" id="alert-m" class="form-input" placeholder="0 phút"></div></div>
            <button class="btn-main" onclick="saveNewTask()">Lưu công việc ✓</button>
        </div>
    </div>

    <!-- MODAL ADD VAULT ITEM -->
    <div id="add-vault-modal" class="modal" onclick="closeModal('add-vault-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin-top:0">Thêm hồ sơ mật</h2>
            <div class="form-group"><label>Tên thông tin (VD: Mật mã két)</label><input type="text" id="v-title" class="form-input"></div>
            <div class="form-group"><label>Nội dung bí mật</label><input type="text" id="v-val" class="form-input"></div>
            <button class="btn-main" onclick="addVaultItem()">Lưu hồ sơ ✓</button>
        </div>
    </div>

    <!-- MODAL CHAT -->
    <div id="task-detail-modal" class="modal" onclick="closeModal('task-detail-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; padding-bottom:15px; border-bottom:1px solid #eee;">
                <div><h2 id="dt-title" style="margin:0; font-size:20px;"></h2><p id="dt-info" style="font-size:11px; color:#666; margin-top:5px;"></p></div>
                <button class="btn-main" style="width:auto; padding:10px 20px; font-size:14px;" id="dt-done-btn">Xong</button>
            </div>
            <div class="chat-box" id="chat-box"></div>
            <div style="display:flex; gap:10px; align-items:center;"><input type="text" id="chat-msg-input" class="form-input" placeholder="Thảo luận..." style="flex:1"><button onclick="sendChat()" style="background:var(--ios-blue); border:none; color:white; width:44px; height:44px; border-radius:50%; font-size:22px;">↑</button></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            SB_URL: "https://zxvlthyrahpfzmrnfbib.supabase.co",
            SB_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dmx0aHlyaGFwZnptcm5mYmliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjM2MjYsImV4cCI6MjA5NTc5OTYyNn0.sjJcMt4RkP5nWF2wldAFV1bIp7i56B0EPXlMtEHMkss",
            TG_TOKEN: "8188166581:AAFCm486x9i1v_t7rNOf9P9uHq68S4yG6tU",
            TG_CHAT_ID: "-1002587798916",
            VAULT_PIN: "0561000963557",
            SWITCH_PIN: "0000",
            AVATARS: {
                "Chồng": "https://lh3.googleusercontent.com/d/1Uv_l3p40A2M_wU0L8Z3W_E_E_f_G_L_8=w1000",
                "Vợ": "https://lh3.googleusercontent.com/d/1_S_t4r3_v5_p_q_W_I_y_L_v_o_v_W_X=w1000"
            }
        };

        const _sb = supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
        let currentUser = localStorage.getItem('jika_user') || 'Chồng';
        let tasks = [], finances = [], events = [], vault = [];
        let currentDetailId = null, currentTab = 'tasks', enteredPin = "";

        async function init() {
            document.getElementById('display-name').innerText = currentUser;
            document.getElementById('user-avatar').src = CONFIG.AVATARS[currentUser];
            document.getElementById('mood-user-name').innerText = `Chào ${currentUser} ❤️`;
            setupSegmentedControls();
            await loadAll();
            if(!localStorage.getItem('jika_mood_time') || Date.now() - localStorage.getItem('jika_mood_time') > 1800000) document.getElementById('mood-overlay').style.display = 'flex';
            setupRealtime();
        }

        async function loadAll() {
            const { data } = await _sb.from('jika_data').select('*');
            if(data) data.forEach(i => {
                if(i.key==='jika_tasks') tasks=JSON.parse(i.value);
                if(i.key==='jika_finances') finances=JSON.parse(i.value);
                if(i.key==='jika_events') events=JSON.parse(i.value);
                if(i.key==='jika_vault') vault=JSON.parse(i.value);
            });
            renderCurrentTab();
        }

        function setupRealtime() {
            _sb.channel('jika_realtime').on('postgres_changes', {event:'*', schema:'public', table:'jika_data'}, payload => {
                const k = payload.new.key; const v = JSON.parse(payload.new.value);
                if(k==='jika_tasks') { tasks=v; if(currentTab==='tasks') renderTasks(); if(currentDetailId) renderChat(currentDetailId); }
                if(k==='jika_finances') { finances=v; if(currentTab==='finance') renderFinance(); }
                if(k==='jika_vault') { vault=v; if(currentTab==='vault' && enteredPin === CONFIG.VAULT_PIN) renderVaultOpen(); }
            }).subscribe();
        }

        function renderCurrentTab() {
            const m = document.getElementById('main-content'); m.innerHTML = '';
            document.getElementById('add-fab').style.display = (currentTab==='tasks'||currentTab==='events'||(currentTab==='vault' && enteredPin===CONFIG.VAULT_PIN)) ? 'flex' : 'none';
            if(currentTab==='tasks') renderTasks();
            if(currentTab==='events') renderEvents();
            if(currentTab==='finance') renderFinance();
            if(currentTab==='vault') enteredPin === CONFIG.VAULT_PIN ? renderVaultOpen() : renderVaultLock();
        }

        // --- TASKS ---
        function renderTasks() {
            const m = document.getElementById('main-content');
            const zones = [{id:'red',l:'LÀM NGAY',c:'var(--ios-red)'},{id:'green',l:'LÊN LỊCH',c:'var(--ios-green)'},{id:'grey',l:'ĐỂ SAU',c:'var(--ios-grey)'}];
            zones.forEach(z => {
                const zt = tasks.filter(t => t.zone === z.id && !t.completed);
                m.innerHTML += `<div class="section-label"><div class="dot" style="background:${z.c}"></div>${z.l}</div>`;
                if(!zt.length) m.innerHTML += `<div style="font-size:11px; color:#aaa; padding:10px 20px;">(Trống)</div>`;
                zt.forEach(t => {
                    m.innerHTML += `<div class="card task-card" onclick="openDetail('${t.id}')">
                        <div class="task-info"><h3>${t.title}</h3><p>👤 ${t.assignee} | ⏳ ${t.deadline?t.deadline.replace('T',' '):'Không hạn'}</p></div>
                        <div class="task-meta"><span class="msg-count">💬 ${t.chat?t.chat.length:0}</span></div>
                    </div>`;
                });
            });
        }

        // --- VAULT ---
        function renderVaultLock() {
            enteredPin = "";
            const m = document.getElementById('main-content');
            m.innerHTML = `<div style="text-align:center; padding-top:20px"><span style="font-size:50px">🗄️</span><h2 style="margin:10px 0 5px">Ngăn Kéo Bảo Mật</h2><p style="color:#666; font-size:13px">Nhập mã PIN để mở tủ hồ sơ</p>
            <div class="pin-dots" id="p-dots">${'<div class="pin-dot"></div>'.repeat(CONFIG.VAULT_PIN.length)}</div>
            <div class="pin-keypad" id="p-pad"></div></div>`;
            const pad = document.getElementById('p-pad');
            for(let i=1; i<=9; i++) pad.innerHTML += `<button class="pin-btn" onclick="tapPin('${i}')">${i}</button>`;
            pad.innerHTML += `<button class="pin-btn" onclick="tapPin('C')" style="font-size:16px; color:#888">C</button><button class="pin-btn" onclick="tapPin('0')">0</button><button class="pin-btn" onclick="tapPin('del')" style="font-size:16px; color:#888">⌫</button>`;
        }

        function tapPin(v) {
            if(v==='C') enteredPin = ""; else if(v==='del') enteredPin = enteredPin.slice(0,-1); else enteredPin += v;
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < enteredPin.length));
            if(enteredPin === CONFIG.VAULT_PIN) renderVaultOpen();
        }

        function renderVaultOpen() {
            const m = document.getElementById('main-content');
            document.getElementById('add-fab').style.display = 'flex';
            m.innerHTML = `<div class="section-label">Hồ sơ gia đình</div>`;
            if(!vault.length) m.innerHTML += `<div class="card" style="text-align:center; color:#888">Chưa có thông tin nào bí mật</div>`;
            vault.forEach((v, idx) => {
                m.innerHTML += `<div class="card vault-item"><div><div class="vault-label">${v.title}</div><div class="vault-val">${v.val}</div></div><div class="del-btn" onclick="delVaultItem(${idx})">✕</div></div>`;
            });
            m.innerHTML += `<button class="btn-main" style="margin-top:20px; background:var(--ios-grey)" onclick="renderVaultLock()">Khóa tủ ngay</button>`;
        }

        async function addVaultItem() {
            const t = document.getElementById('v-title').value, v = document.getElementById('v-val').value;
            if(!t || !v) return; vault.push({title:t, val:v});
            closeModal('add-vault-modal'); await _sb.from('jika_data').upsert({key:'jika_vault', value:JSON.stringify(vault)});
        }

        async function delVaultItem(idx) {
            if(!confirm("Xóa mục này?")) return; vault.splice(idx, 1);
            await _sb.from('jika_data').upsert({key:'jika_vault', value:JSON.stringify(vault)});
        }

        // --- UTILS ---
        function nav(p, el) { currentTab=p; document.querySelectorAll('.tab-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); document.getElementById('page-title').innerText=el.innerText.trim(); renderCurrentTab(); }
        function showAddModal() { if(currentTab==='vault') document.getElementById('add-vault-modal').style.display='flex'; else document.getElementById('add-task-modal').style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; if(id==='task-detail-modal') currentDetailId=null; }
        function setupSegmentedControls() { document.querySelectorAll('.segmented-control button').forEach(b => b.onclick = function(){ this.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('active')); this.classList.add('active'); }); }
        
        async function saveMood(m) { moods.push({u:currentUser, m, t:new Date().toISOString()}); localStorage.setItem('jika_mood_time', Date.now()); document.getElementById('mood-overlay').style.display='none'; await _sb.from('jika_data').upsert({key:'jika_moods', value:JSON.stringify(moods)}); }
        function switchUserPrompt() { if(prompt("Nhập PIN 0000 để đổi máy:")===CONFIG.SWITCH_PIN) { currentUser=currentUser==='Chồng'?'Vợ':'Chồng'; localStorage.setItem('jika_user', currentUser); location.reload(); } }
        
        function openDetail(id) { currentDetailId=id; const t=tasks.find(x=>x.id===id); document.getElementById('dt-title').innerText=t.title; document.getElementById('dt-info').innerText=`Người làm: ${t.assignee} | Hạn: ${t.deadline||'Không'}`; document.getElementById('dt-done-btn').onclick=()=>finishTask(id); document.getElementById('task-detail-modal').style.display='flex'; renderChat(id); }
        function renderChat(id) { const t=tasks.find(x=>x.id===id); const b=document.getElementById('chat-box'); b.innerHTML=''; (t.chat||[]).forEach(m=> b.innerHTML+=`<div class="msg ${m.user===currentUser?'sent':'received'}">${m.text}</div>`); b.scrollTop=b.scrollHeight; }
        async function sendChat() { const i=document.getElementById('chat-msg-input'); if(!i.value.trim())return; const t=tasks.find(x=>x.id===currentDetailId); if(!t.chat)t.chat=[]; t.chat.push({user:currentUser, text:i.value.trim()}); i.value=''; renderChat(currentDetailId); await _sb.from('jika_data').upsert({key:'jika_tasks', value:JSON.stringify(tasks)}); }
        async function finishTask(id) { tasks.find(x => x.id === id).completed = true; closeModal('task-detail-modal'); await _sb.from('jika_data').upsert({ key: 'jika_tasks', value: JSON.stringify(tasks) }); }
        
        async function saveNewTask() {
            const title = document.getElementById('task-title-input').value.trim(); if(!title) return;
            tasks.push({ id:'t'+Date.now(), title, zone:document.querySelector('#zone-selector .active').dataset.val, assignee:document.querySelector('#assignee-selector .active').dataset.val, deadline:document.getElementById('task-deadline-input').value, completed:false, chat:[] });
            closeModal('add-task-modal'); await _sb.from('jika_data').upsert({key:'jika_tasks', value:JSON.stringify(tasks)});
        }
        
        // Tab Finance & Events placeholders (bạn có thể bổ sung tương tự)
        function renderFinance() { document.getElementById('main-content').innerHTML = '<div class="section-label">Tài chính</div><div class="card">Đang đồng bộ dữ liệu...</div>'; }
        function renderEvents() { document.getElementById('main-content').innerHTML = '<div class="section-label">Sự kiện</div><div class="card">Đang đồng bộ dữ liệu...</div>'; }

        window.onload = init;
    </script>
</body>
